name: Crypto News Sync

on:
  schedule:
    - cron: "*/30 0-15 * * 1-5"
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crypto-news
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Collect crypto Telegram news
        env:
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: node scripts/crypto-news.mjs

      - name: Commit updated crypto news
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/crypto-news.json; then
            echo "::notice::No crypto news changes to commit"
            exit 0
          fi
          STAMP=$(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')
          git add data/crypto-news.json
          git commit -m "chore(data): sync crypto news ${STAMP}"
          git pull --rebase origin main
          git push
