name: KR Screener Cache Build

# 매매시그널 '즉시검색' — 국내 전종목 일봉 지표(MA/RSI/다이버전스/52주고저) 캐시를
# 장마감 후 하루 1회 미리 계산해 data/kr-screener-cache.json 으로 커밋한다.
# RSI/MA/다이버전스는 일봉 기준이라 장중에는 어차피 값이 안 바뀌므로 하루 1회로 충분.
#
# 종목당 여러 번의 KIS 일봉 조회가 필요해 전종목(~2,650개) 기준 실행 시간이 꽤 걸릴 수
# 있다(실제 KIS 자격증명으로 검증되지 않음 — 처음 몇 번 실행 로그를 보고
# SCREENER_GAP_MS/timeout-minutes 조정이 필요할 수 있음).
on:
  schedule:
    - cron: "0 7 * * 1-5" # 평일 16:00 KST (장마감 15:30 이후)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: kr-screener-cache
  cancel-in-progress: false

env:
  TZ: Asia/Seoul

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT_REPO_SECRETS_WRITE || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Build screener cache
        run: node scripts/build-screener-cache.mjs
        env:
          KIS_ACCESS_TOKEN: ${{ secrets.KIS_ACCESS_TOKEN }}
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_BASE_URL: ${{ secrets.KIS_BASE_URL }}

      - name: Commit data/kr-screener-cache.json
        id: commit
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/kr-screener-cache.json
          if git diff --staged --quiet; then
            echo "::notice::No screener cache changes to commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            STAMP=$(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')
            git commit -m "chore(data): KR screener cache ${STAMP}"
            git pull --rebase origin main
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # data/ 전용 커밋은 vercel.json의 ignoreCommand(배포 횟수 절약용)가 자동 배포를
      # 건너뛰기 때문에, 여기서 명시적으로 배포하지 않으면 스크리너 데이터가 커밋만 되고
      # 실제 서비스에는 영원히 반영되지 않는다. daily-market-sync.yml과 동일한 패턴.
      - name: Deploy to Vercel
        if: steps.commit.outputs.changed == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx --yes vercel@53.2.0 deploy --prod --token "$VERCEL_TOKEN" --yes
