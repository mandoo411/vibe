name: Live Market Report

on:
  schedule:
    - cron: "55 23 * * 0-4" # 08:55 KST
    - cron: "25 0 * * 1-5" # 09:25 KST
    - cron: "55 0 * * 1-5" # 09:55 KST
    - cron: "25 1 * * 1-5" # 10:25 KST
    - cron: "55 1 * * 1-5" # 10:55 KST
    - cron: "25 2 * * 1-5" # 11:25 KST
    - cron: "55 2 * * 1-5" # 11:55 KST
    - cron: "25 3 * * 1-5" # 12:25 KST
    - cron: "55 3 * * 1-5" # 12:55 KST
    - cron: "25 4 * * 1-5" # 13:25 KST
    - cron: "55 4 * * 1-5" # 13:55 KST
    - cron: "25 5 * * 1-5" # 14:25 KST
    - cron: "55 5 * * 1-5" # 14:55 KST
    - cron: "25 6 * * 1-5" # 15:25 KST
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: live-market-report
  cancel-in-progress: false

env:
  TZ: Asia/Seoul

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT_REPO_SECRETS_WRITE || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: node scripts/telegram-live-report.mjs
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCESS_TOKEN: ${{ secrets.KIS_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          GH_PAT_REPO_SECRETS_WRITE: ${{ secrets.GH_PAT_REPO_SECRETS_WRITE }}
