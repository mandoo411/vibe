name: Live Market Report

on:
  schedule:
    # 30분 슬롯 저장. GitHub cron 지연을 감안해 각 슬롯을 10분 간격으로 보강 실행.
    # 예: 09:30 데이터는 09:30/09:40/09:50 중 성공한 실행이 09:30 슬롯을 갱신.
    - cron: "0,10,20,30,40,50 0-5 * * 1-5" # 09:00-14:50 KST
    - cron: "0,10,20,30 6 * * 1-5" # 15:00-15:30 KST
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: live-market-report
  cancel-in-progress: false

env:
  TZ: Asia/Seoul

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT_REPO_SECRETS_WRITE || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: node scripts/telegram-live-report.mjs
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCESS_TOKEN: ${{ secrets.KIS_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          GH_PAT_REPO_SECRETS_WRITE: ${{ secrets.GH_PAT_REPO_SECRETS_WRITE }}
