name: Live Market Report

on:
  schedule:
    # KST 장중(09:00~15:30) UTC 0-6 — 10분마다 + 30분 슬롯 직후 보강
    - cron: "*/10 0-6 * * 1-5"
    - cron: "5,35 0-6 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: live-market-report
  cancel-in-progress: false

env:
  TZ: Asia/Seoul
  # 스케줄 1회에 밀린 슬롯 최대 5개까지 보강 (기본 1)
  LIVE_REPORT_MAX_CATCHUP: "5"

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT_REPO_SECRETS_WRITE || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: node scripts/telegram-live-report.mjs
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCESS_TOKEN: ${{ secrets.KIS_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          GH_PAT_REPO_SECRETS_WRITE: ${{ secrets.GH_PAT_REPO_SECRETS_WRITE }}
