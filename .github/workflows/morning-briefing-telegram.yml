name: Morning Briefing Telegram Notify

# Cowork(totalmoney-morning-briefing 예약작업)가 AI 분석을 작성해 data/morning-briefing.json을
# main에 push하면(커밋 메시지가 "AI 분석"을 포함) 즉시 텔레그램 채널로 요약을 발송한다.
#
# 왜 필요한가: Cowork 실행 환경(샌드박스)은 아웃바운드 네트워크 정책상
# api.telegram.org 호출이 막혀 있어 Cowork 안에서 직접 발송할 수 없다.
# 이 워크플로우가 telegram-notify.yml과 동일한 패턴으로 그 발송 단계만 대신 맡는다.
#
# 트리거는 cron이 아니라 push 이벤트라서 "예약 시각보다 늦게 도는" 문제가 없다 —
# Cowork가 push 하는 순간 GitHub가 즉시 큐잉한다.
#
# data/morning-briefing.json은 morning-briefing.yml(수치 데이터 수집, push-트리거)도
# 매일 건드리므로, 그 push와 헷갈리지 않도록 커밋 메시지로 "AI 분석" 포함 push만 골라낸다.
on:
  push:
    branches: [main]
    paths:
      - data/morning-briefing.json
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: morning-briefing-telegram
  cancel-in-progress: false

env:
  TZ: Asia/Seoul

jobs:
  notify:
    # 수동 실행(workflow_dispatch)은 항상 허용 — 테스트/재발송용.
    # push 이벤트는 AI 분석 push 커밋(morning-briefing.yml의 단순 수치 데이터 동기화 push와 구분)일 때만.
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, 'AI 분석')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Create .env from secrets
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          {
            printf 'TELEGRAM_TOKEN=%s\n'      "$TELEGRAM_TOKEN"
            printf 'TELEGRAM_CHANNEL_ID=%s\n' "$TELEGRAM_CHANNEL_ID"
          } > .env

      - name: Send Telegram morning briefing summary
        run: npm run sync:morning-telegram

      - name: Cleanup secrets
        if: always()
        run: rm -f .env
