name: Morning Briefing (numeric data)

on:
  push:
    branches: [main]
    paths:
      - "data/.briefing-trigger"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: morning-briefing
  cancel-in-progress: false

env:
  TZ: Asia/Seoul

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Collect numeric market data
        env:
          KIS_ACCESS_TOKEN: ${{ secrets.KIS_ACCESS_TOKEN }}
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: node scripts/morning-briefing.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/morning-briefing.json; then
            echo "No data change, skipping commit"
            exit 0
          fi
          STAMP=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M %Z')
          git add data/morning-briefing.json
          git commit -m "chore(data): briefing numeric data ${STAMP}"
          git push
