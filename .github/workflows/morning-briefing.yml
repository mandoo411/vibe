name: Morning Briefing

# 평일 06:00 KST 장전 실행 (08:00 KST 전 웹 반영 목표)
# GitHub cron은 UTC 고정 — KST 평일(월~금)은 전날 UTC 일~목에 매핑
#   06:00 KST 월 = 일 21:00 UTC → cron "0 21 * * 0-4"
# (이전 "30 22 * * 1-5"는 KST 화~토 07:30에 돌아 월요일 브리핑이 늦었음)
on:
  schedule:
    - cron: "0 21 * * 0-4"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: morning-briefing
  cancel-in-progress: false

env:
  TZ: Asia/Seoul

jobs:
  briefing:
    name: Run morning briefing script
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Create .env from secrets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          KIS_ACCESS_TOKEN: ${{ secrets.KIS_ACCESS_TOKEN }}
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: |
          printf 'ANTHROPIC_API_KEY=%s\n' "$ANTHROPIC_API_KEY" > .env
          printf 'KIS_ACCESS_TOKEN=%s\n' "$KIS_ACCESS_TOKEN" >> .env
          printf 'KIS_APP_KEY=%s\n' "$KIS_APP_KEY" >> .env
          printf 'KIS_APP_SECRET=%s\n' "$KIS_APP_SECRET" >> .env
          printf 'NEWSAPI_KEY=%s\n' "$NEWSAPI_KEY" >> .env
          printf 'TELEGRAM_TOKEN=%s\n' "$TELEGRAM_TOKEN" >> .env
          printf 'TELEGRAM_CHANNEL_ID=%s\n' "$TELEGRAM_CHANNEL_ID" >> .env
          printf 'TELEGRAM_SESSION=%s\n' "$TELEGRAM_SESSION" >> .env
          printf 'TELEGRAM_API_ID=%s\n' "$TELEGRAM_API_ID" >> .env
          printf 'TELEGRAM_API_HASH=%s\n' "$TELEGRAM_API_HASH" >> .env

      - name: Run morning briefing
        run: npm run sync:briefing

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain -- data/morning-briefing.json)" ]; then
            echo "::notice::No changes to data/morning-briefing.json"
          else
            STAMP=$(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')
            git add data/morning-briefing.json
            git commit -m "chore(data): morning briefing ${STAMP}"
            git pull --rebase origin main
            git push
          fi

      - name: Send Telegram morning briefing
        run: node --env-file=.env scripts/telegram-morning-briefing.mjs

      - name: Cleanup secrets
        if: always()
        run: rm -f .env
