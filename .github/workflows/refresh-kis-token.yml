# 한국투자증권 OAuth 액세스 토큰을 하루 1회 갱신해 GitHub/Vercel 환경변수에 반영합니다.
#
# 작업 중인 API/스크립트에서는 tokenP를 호출하지 않고, 이 스케줄에서만 발급합니다.
# 필요 secrets: KIS_APP_KEY, KIS_APP_SECRET, GH_PAT_REPO_SECRETS_WRITE, VERCEL_TOKEN

name: Refresh KIS access token

on:
  schedule:
    # 매일 08:00 KST ≈ 전날 23:00 UTC (KST = UTC+9)
    - cron: "0 23 * * *"
  workflow_dispatch:

concurrency:
  group: refresh-kis-token
  cancel-in-progress: true

env:
  # Vercel 프로젝트(bori-cal) — production alias: vibe-mu-nine.vercel.app
  VERCEL_ORG_ID: team_QubZdjmTuImLo6ClM59KHPrt
  VERCEL_PROJECT_ID: prj_VnAs98x3Puq8qzzdylHyrGyYZHFJ

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Issue KIS OAuth token once daily
        id: kis
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${KIS_APP_KEY:-}" ] || [ -z "${KIS_APP_SECRET:-}" ]; then
            echo "Missing KIS_APP_KEY or KIS_APP_SECRET in repository secrets."
            exit 1
          fi
          BASE="${KIS_BASE_URL:-https://openapi.koreainvestment.com:9443}"
          BASE="${BASE%/}"
          RESP="$(curl -sS -X POST "${BASE}/oauth2/tokenP" \
            -H "content-type: application/json; charset=utf-8" \
            -d "{\"grant_type\":\"client_credentials\",\"appkey\":\"${KIS_APP_KEY}\",\"appsecret\":\"${KIS_APP_SECRET}\"}")"
          echo "$RESP" | jq -e '.access_token' >/dev/null || { echo "tokenP response: $RESP"; exit 1; }
          echo "$RESP" | jq -r '.access_token' > kis_access_token.txt
          echo "issued=true" >> "$GITHUB_OUTPUT"

      - name: Update repository secret KIS_ACCESS_TOKEN
        if: steps.kis.outputs.issued == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_REPO_SECRETS_WRITE }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "Missing GH_PAT_REPO_SECRETS_WRITE — add a PAT with permission to update repo Actions secrets."
            exit 1
          fi
          gh secret set KIS_ACCESS_TOKEN --repo "${{ github.repository }}" < kis_access_token.txt
          echo "KIS_ACCESS_TOKEN updated in GitHub Secrets."

      - name: Update Vercel production KIS_ACCESS_TOKEN
        if: steps.kis.outputs.issued == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${VERCEL_TOKEN:-}" ]; then
            echo "Missing VERCEL_TOKEN in repository secrets."
            exit 1
          fi
          TOKEN_VALUE="$(cat kis_access_token.txt)"
          npx --yes vercel@53.2.0 env rm KIS_ACCESS_TOKEN production --yes --token "$VERCEL_TOKEN" >/dev/null 2>&1 || true
          printf "%s" "$TOKEN_VALUE" | npx --yes vercel@53.2.0 env add KIS_ACCESS_TOKEN production --token "$VERCEL_TOKEN" --force
          echo "KIS_ACCESS_TOKEN updated in Vercel Production environment."

      - name: Redeploy Vercel production
        if: steps.kis.outputs.issued == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx --yes vercel@53.2.0 deploy --prod --token "$VERCEL_TOKEN" --yes

      - name: Cleanup token file
        if: always()
        run: rm -f kis_access_token.txt
