name: X Auto Tweet

# 평일 09:00~17:30 KST 30분 간격. market-data-sync.yml(*/30 * * * *)이 앞서 데이터를 갱신해두는 것을 전제로 함.
# 데이터가 이전 실행과 동일하면(장 마감 등) 스크립트 내부에서 자동으로 건너뛰어 중복 트윗을 방지한다.
on:
  schedule:
    - cron: "5,35 0-8 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: twitter-post
  cancel-in-progress: false

env:
  TZ: Asia/Seoul

jobs:
  tweet:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Post tweet if data changed
        run: node scripts/twitter-post.mjs
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}

      - name: Commit last-tweet hash if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/.last-tweet-hash.json
          if git diff --staged --quiet; then
            exit 0
          fi
          git commit -m "chore(promo): last tweet hash update"
          git pull --rebase origin main
          git push
