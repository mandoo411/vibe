<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0d0b08" />
    <title>TotalMoney AI · 브리핑</title>
    <link rel="icon" type="image/png" href="./assets/totalmoney_ai.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+KR:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./weekly-market.css" />
    <link rel="stylesheet" href="./site-nav.css" />
    <script src="./site-nav.js" defer></script>
    <style>
      .briefing-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .briefing-card {
        border: 1px solid var(--border);
        background: rgba(24, 21, 16, 0.82);
        padding: 14px;
      }

      .briefing-card h2,
      .briefing-card h3 {
        margin: 0 0 10px;
        font-size: 15px;
      }

      .briefing-list {
        display: grid;
        gap: 8px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .briefing-row {
        display: grid;
        grid-template-columns: minmax(92px, 1fr) minmax(120px, auto);
        align-items: baseline;
        gap: 12px;
        font-size: 13px;
        color: var(--text-muted);
      }

      .briefing-row strong {
        min-width: 0;
        color: var(--text);
        font-weight: 600;
      }

      .briefing-row__value {
        display: inline-grid;
        grid-template-columns: minmax(72px, auto) minmax(58px, auto);
        gap: 10px;
        justify-content: end;
        align-items: baseline;
        font-family: var(--font-mono);
        color: var(--accent-bright);
        font-variant-numeric: tabular-nums;
        text-align: right;
        white-space: nowrap;
      }

      .briefing-change--up {
        color: #f87171;
      }

      .briefing-change--down {
        color: #60a5fa;
      }

      .briefing-news-list {
        display: grid;
        gap: 10px;
      }

      .briefing-news-card {
        display: block;
        padding: 12px;
        border: 1px solid var(--border);
        background: #0f0d09;
        color: var(--text);
        transition:
          border-color 0.18s ease,
          background 0.18s ease;
      }

      .briefing-news-card:hover,
      .briefing-news-card:focus-visible {
        border-color: var(--accent-bright);
        background: rgba(212, 175, 55, 0.08);
        text-decoration: none;
        outline: none;
      }

      .briefing-news-card span {
        display: block;
        margin-bottom: 4px;
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-dim);
      }

      .briefing-news-card strong {
        display: block;
        font-size: 14px;
        line-height: 1.45;
      }

      .briefing-card--wide {
        grid-column: 1 / -1;
      }

      @media (max-width: 768px) {
        .briefing-grid {
          grid-template-columns: 1fr;
        }
        .briefing-row {
          grid-template-columns: minmax(80px, 1fr) minmax(108px, auto);
          gap: 8px;
        }
        .briefing-row__value {
          grid-template-columns: minmax(62px, auto) minmax(52px, auto);
          gap: 6px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="tm-site-header">
        <div class="header-top">
          <a class="header-top__link" href="./index.html" aria-label="TotalMoney AI 홈">
            <img
              class="header-top__logo"
              src="./assets/totalmoney_ai.png"
              alt=""
              width="36"
              height="36"
              decoding="async"
            />
            <span class="header-top__title">TotalMoney AI</span>
            <span class="header-top__tagline">Smarter Financial Decisions</span>
          </a>
        </div>

        <nav class="tm-site-nav" aria-label="주요 메뉴">
          <a class="tm-site-nav__link" href="./index.html">홈</a>
          <a class="tm-site-nav__link" href="./daily-market.html">마감시황</a>
          <a class="tm-site-nav__link" href="./briefing.html" aria-current="page">브리핑</a>
          <a class="tm-site-nav__link" href="./realtime.html">실시간시세</a>
          <a class="tm-site-nav__link" href="./weekly-market.html">일정</a>
          <a class="tm-site-nav__link" href="./live-report.html">LIVE-증시</a>
          <a class="tm-site-nav__link" href="./us-market.html">미증시</a>
          <a class="tm-site-nav__link" href="./crypto.html">암호화폐</a>
        </nav>
      </header>
      <header class="masthead masthead--title-only">
        <div class="masthead__copy">
          <p class="masthead__kicker">Market Briefing</p>
          <h1 class="masthead__title">브리핑</h1>
        </div>
      </header>
      <div class="page-hero-sub">
        <p class="masthead__notice" id="masthead-notice" hidden></p>
        <div class="masthead__meta">
          <span id="briefing-updated">미국 마감, 환율, 주요 뉴스</span>
        </div>
      </div>
      <main class="briefing-grid" aria-live="polite">
        <section class="briefing-card briefing-card--wide">
          <h2>Claude AI 장전 분석</h2>
          <div id="ai-analysis"><p class="empty-text">브리핑 데이터를 불러오는 중입니다.</p></div>
        </section>

        <section class="briefing-card">
          <h2>간밤 미국시장</h2>
          <ul class="briefing-list" id="us-market-list"></ul>
        </section>

        <section class="briefing-card">
          <h2>미국 주요종목 TOP10</h2>
          <ul class="briefing-list" id="top-stocks-list"></ul>
        </section>

        <section class="briefing-card">
          <h2>섹터별 등락률</h2>
          <ul class="briefing-list" id="sectors-list"></ul>
        </section>

        <section class="briefing-card">
          <h2>환율 & 원자재</h2>
          <ul class="briefing-list" id="forex-list"></ul>
        </section>

        <section class="briefing-card">
          <h2>BTC 시황</h2>
          <ul class="briefing-list" id="crypto-list"></ul>
        </section>

        <section class="briefing-card briefing-card--wide">
          <h2>국내주식 관련 뉴스</h2>
          <div class="briefing-news-list" id="news-list"></div>
        </section>
      </main>
    </div>
    <script>
      const DATA_URL = "./data/morning-briefing.json";
      const $ = (id) => document.getElementById(id);

      function escapeHtml(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function fmtNumber(value, digits = 2) {
        const n = Number(value);
        if (!Number.isFinite(n)) return "—";
        return n.toLocaleString("ko-KR", { maximumFractionDigits: digits });
      }

      function fmtChange(value) {
        const n = Number(value);
        if (!Number.isFinite(n)) return '<span>—</span>';
        const cls = n > 0 ? "briefing-change--up" : n < 0 ? "briefing-change--down" : "";
        const sign = n > 0 ? "+" : "";
        return `<span class="${cls}">${sign}${n.toFixed(2)}%</span>`;
      }

      function fmtNewsTime(value) {
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) return "";
        return new Intl.DateTimeFormat("ko-KR", {
          timeZone: "Asia/Seoul",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          hour12: false,
        })
          .format(d)
          .replace(/\.$/, "");
      }

      function renderRows(id, rows, getLabel, getValue) {
        $(id).innerHTML = rows && rows.length
          ? rows.map((row) => `<li class="briefing-row"><strong>${escapeHtml(getLabel(row))}</strong><span class="briefing-row__value">${getValue(row)}</span></li>`).join("")
          : '<li class="empty-text">데이터 없음</li>';
      }

      function renderAnalysis(ai) {
        const keyIssues = Array.isArray(ai?.keyIssues) ? ai.keyIssues : [];
        const watchSectors = Array.isArray(ai?.watchSectors) ? ai.watchSectors : [];
        $("ai-analysis").innerHTML = `
          <h3>오늘 주목할 핵심 이슈 3가지</h3>
          ${keyIssues.length ? `<ol>${keyIssues.map((v) => `<li>${escapeHtml(v)}</li>`).join("")}</ol>` : '<p class="empty-text">분석 대기 중</p>'}
          <h3>국내 증시 영향 분석</h3>
          <p>${escapeHtml(ai?.domesticImpact || "분석 대기 중")}</p>
          <h3>오늘 주목 섹터/종목</h3>
          ${watchSectors.length ? `<ul>${watchSectors.map((v) => `<li>${escapeHtml(v)}</li>`).join("")}</ul>` : '<p class="empty-text">분석 대기 중</p>'}
        `;
      }

      function renderNews(rows) {
        const list = Array.isArray(rows) ? rows.slice(0, 20) : [];
        $("news-list").innerHTML = list.length
          ? list.map((n) => `<a class="briefing-news-card" href="${escapeHtml(n.url || "#")}" target="_blank" rel="noopener noreferrer">
              <span>${escapeHtml(n.source || "뉴스")} · ${escapeHtml(fmtNewsTime(n.publishedAt))}</span>
              <strong>${escapeHtml(n.title || "제목 없음")}</strong>
            </a>`).join("")
          : '<p class="empty-text">뉴스 없음</p>';
      }

      async function loadBriefing() {
        try {
          const res = await fetch(DATA_URL, { cache: "no-store" });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          $("briefing-updated").textContent = data.updatedAt ? `마지막 업데이트: ${data.updatedAt}` : "미국 마감, 환율, 주요 뉴스";
          renderAnalysis(data.aiAnalysis || {});
          renderRows("us-market-list", data.usMarket?.indices || [], (r) => r.name || r.symbol, (r) => `${fmtNumber(r.close, 0)} ${fmtChange(r.changePct)}`);
          renderRows("top-stocks-list", data.topStocks || [], (r) => r.symbol, (r) => `${fmtNumber(r.price)} ${fmtChange(r.changePct)}`);
          renderRows("sectors-list", data.sectors || [], (r) => r.name || r.symbol, (r) => `<span></span>${fmtChange(r.changePct)}`);
          const forexRows = Object.entries(data.forex?.rates || {}).map(([pair, value]) => ({ pair, value }));
          const commodityRows = data.forex?.commodities || [];
          renderRows("forex-list", [...forexRows, ...commodityRows], (r) => r.pair || r.name, (r) => r.pair ? `<span>${fmtNumber(r.value, 4)}</span>` : `${fmtNumber(r.price)} ${fmtChange(r.changePct)}`);
          renderRows("crypto-list", data.crypto?.assets || [], (r) => r.symbol, (r) => `$${fmtNumber(r.priceUsd, 0)} ${fmtChange(r.changePct24h)}`);
          renderNews(data.news || []);
        } catch (error) {
          $("masthead-notice").hidden = false;
          $("masthead-notice").textContent = `브리핑 데이터를 불러오지 못했습니다: ${error instanceof Error ? error.message : error}`;
        }
      }

      loadBriefing();
    </script>
  </body>
</html>
