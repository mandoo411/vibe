<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#131722" />
    <title>TotalMoney AI · 브리핑</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <link rel="apple-touch-icon" href="/assets/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+KR:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="./theme.js"></script>
    <link rel="stylesheet" href="./theme.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"
    />

    <link rel="stylesheet" href="./weekly-market.css" />
    <link rel="stylesheet" href="./site-nav.css" />
    <script src="./assets/data-url.js"></script>
    <script src="./site-nav.js" defer></script>
    <style>
      .briefing-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .briefing-card {
        border: 1px solid var(--border);
        background: var(--bg-secondary);
        padding: 14px;
      }

      .briefing-card h2,
      .briefing-card h3 {
        margin: 0 0 10px;
        font-size: 15px;
      }

      .briefing-list {
        display: grid;
        gap: 8px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .briefing-row {
        display: grid;
        grid-template-columns: minmax(92px, 1fr) minmax(120px, auto);
        align-items: baseline;
        gap: 12px;
        font-size: 13px;
        color: var(--text-muted);
      }

      .briefing-row strong {
        min-width: 0;
        color: var(--text);
        font-weight: 600;
      }

      .briefing-row__value {
        display: inline-grid;
        grid-template-columns: minmax(72px, auto) minmax(58px, auto);
        gap: 10px;
        justify-content: end;
        align-items: baseline;
        font-family: var(--font-mono);
        color: var(--accent-bright);
        font-variant-numeric: tabular-nums;
        text-align: right;
        white-space: nowrap;
      }

      .briefing-change--up {
        color: var(--up-color);
      }

      .briefing-change--down {
        color: var(--down-color);
      }

      .briefing-news-list {
        display: grid;
        gap: 10px;
      }

      .briefing-news-card {
        display: block;
        padding: 12px;
        border: 1px solid var(--border);
        background: var(--bg-secondary);
        color: var(--text);
        transition:
          border-color 0.18s ease,
          background 0.18s ease;
      }

      .briefing-news-card:hover,
      .briefing-news-card:focus-visible {
        border-color: var(--accent-bright);
        background: var(--accent-dim);
        text-decoration: none;
        outline: none;
      }

      .briefing-news-card span {
        display: block;
        margin-bottom: 4px;
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-dim);
      }

      .briefing-news-card strong {
        display: block;
        font-size: 14px;
        line-height: 1.45;
      }

      .briefing-card--wide {
        grid-column: 1 / -1;
      }

      .briefing-card--macro {
        order: -3;
      }

      .briefing-card--us {
        order: -2;
        display: flex;
        flex-direction: column;
        min-height: 100%;
      }

      .briefing-card--us h2 {
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        justify-content: space-between;
        gap: 8px;
      }

      .briefing-us-updated {
        font-family: var(--font-mono);
        font-size: 11px;
        font-weight: 400;
        color: var(--text-dim);
      }

      .briefing-row--index {
        padding-bottom: 10px;
        border-bottom: 1px solid var(--border);
      }

      .briefing-row--index:last-child {
        border-bottom: none;
        padding-bottom: 0;
      }

      .briefing-row__meta {
        grid-column: 1 / -1;
        margin-top: 4px;
        font-size: 12px;
        line-height: 1.45;
        color: var(--text-muted);
      }

      .briefing-badge {
        display: inline-block;
        margin-left: 6px;
        padding: 1px 6px;
        border: 1px solid var(--accent-ring);
        border-radius: 4px;
        font-family: var(--font-mono);
        font-size: 10px;
        font-weight: 500;
        color: var(--accent-bright);
        vertical-align: middle;
      }

      .briefing-us-sub {
        margin-top: auto;
        padding-top: 12px;
        border-top: 1px solid var(--border);
      }

      .briefing-us-sub h3 {
        margin: 0 0 8px;
        font-size: 12px;
        font-weight: 600;
        color: var(--text-dim);
        letter-spacing: 0.02em;
      }

      .briefing-us-sub .briefing-list {
        gap: 6px;
      }

      .briefing-card--crypto {
        display: none;
      }

      .briefing-news-card.is-telegram {
        border-color: var(--accent-ring);
      }

      .briefing-news-summary {
        margin: 8px 0 0;
        padding: 9px 10px;
        border: 1px solid var(--accent-highlight);
        background: var(--accent-dim);
        color: var(--text-muted);
        font-size: 13px;
        line-height: 1.5;
      }

      @media (max-width: 768px) {
        .briefing-grid {
          grid-template-columns: 1fr;
        }
        .briefing-row {
          grid-template-columns: minmax(80px, 1fr) minmax(108px, auto);
          gap: 8px;
        }
        .briefing-row__value {
          grid-template-columns: minmax(62px, auto) minmax(52px, auto);
          gap: 6px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="tm-site-header">
        <div class="header-top">
          <a class="logo logo-link header-top__link" href="./index.html" aria-label="TotalMoney AI 홈">
            <div class="nav-logo-wrap" style="display:flex; align-items:center; gap:12px;">
              <div class="nav-logo-box" style="background:linear-gradient(145deg,#e4e8ff,#c8d0ff); border-radius:20px; width:62px; height:62px; display:flex; flex-direction:column; align-items:center; justify-content:center; box-shadow: 0 6px 16px rgba(51,57,191,0.2), inset 0 1px 2px rgba(255,255,255,0.9); gap:2px;">
                <span class="nav-logo-text" style="font-size:16px; font-weight:900; color:#3339BF; line-height:1; display:block; text-align:center; width:100%;">TM</span>
                <span class="nav-logo-text" style="font-size:16px; font-weight:900; color:#3339BF; line-height:1; display:block; text-align:center; width:100%;">AI</span>
              </div>
              <div style="line-height:1.35;">
                <div class="nav-brand-name" style="font-size:15px; font-weight:800; letter-spacing:-0.3px;">TotalMoney</div>
                <div style="display:flex; align-items:center; gap:5px; margin-top:2px;">
                  <span class="nav-brand-sub" style="font-size:11px;">powered by</span>
                  <span class="nav-ai-badge">AI</span>
                </div>
              </div>
            </div>
          </a>
        </div>

        <nav class="tm-site-nav" aria-label="주요 메뉴">
          <a class="tm-site-nav__link" href="./index.html">홈</a>
          <a class="tm-site-nav__link" href="./daily-market.html">마감시황</a>
          <a class="tm-site-nav__link" href="./briefing.html" aria-current="page">브리핑</a>
          <a class="tm-site-nav__link" href="./realtime.html">실시간시세</a>
          <a class="tm-site-nav__link" href="./weekly-market.html">일정</a>
          <a class="tm-site-nav__link" href="./us-market.html">미증시</a>
          <a class="tm-site-nav__link" href="./crypto.html">암호화폐</a>
          <a class="tm-site-nav__link" href="./world-market.html">글로벌 랭킹</a>

        </nav>
        <button
          type="button"
          class="tm-theme-toggle"
          id="theme-toggle"
          aria-label="테마 전환"
          title="테마 전환"
        >
          <i class="ti ti-sun" id="theme-icon" aria-hidden="true"></i>
        </button>
      </header>
      <header class="masthead masthead--title-only">
        <div class="masthead__copy">
          <p class="masthead__kicker">Market Briefing</p>
          <h1 class="masthead__title">브리핑</h1>
        </div>
      </header>
      <div class="page-hero-sub">
        <p class="masthead__notice" id="masthead-notice" hidden></p>
        <div class="masthead__meta">
          <span id="briefing-updated">미국 마감, 환율, 주요 뉴스</span>
        </div>
      </div>
      <main class="briefing-grid" aria-live="polite">
        <section class="briefing-card briefing-card--wide">
          <h2>Claude AI 장전 분석</h2>
          <div id="ai-analysis"><p class="empty-text">브리핑 데이터를 불러오는 중입니다.</p></div>
        </section>

        <section class="briefing-card briefing-card--us">
          <h2>
            간밤 미국시장
            <span class="briefing-us-updated" id="us-market-updated" hidden></span>
          </h2>
          <ul class="briefing-list" id="us-market-list"></ul>
          <div class="briefing-us-sub" id="us-market-sub" hidden>
            <h3>주요 종목 · 섹터</h3>
            <ul class="briefing-list" id="us-market-sub-list"></ul>
          </div>
        </section>

        <section class="briefing-card">
          <h2>미국 주요종목 TOP10</h2>
          <ul class="briefing-list" id="top-stocks-list"></ul>
        </section>

        <section class="briefing-card">
          <h2>섹터별 등락률</h2>
          <ul class="briefing-list" id="sectors-list"></ul>
        </section>

        <section class="briefing-card briefing-card--macro">
          <h2>원자재/환율 현황</h2>
          <ul class="briefing-list" id="forex-list"></ul>
        </section>

        <section class="briefing-card briefing-card--crypto" hidden aria-hidden="true">
          <h2>BTC 시황</h2>
          <ul class="briefing-list" id="crypto-list"></ul>
        </section>

        <section class="briefing-card briefing-card--wide briefing-card--news">
          <h2>주요 뉴스 (텔레그램)</h2>
          <div class="briefing-news-list" id="news-list"></div>
        </section>
      </main>
    </div>
    <script>
      const DATA_URL = tmDataUrl("data/morning-briefing.json");
      const $ = (id) => document.getElementById(id);

      function escapeHtml(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function fmtNumber(value, digits = 2) {
        const n = Number(value);
        if (!Number.isFinite(n)) return "—";
        return n.toLocaleString("ko-KR", { maximumFractionDigits: digits });
      }

      function fmtChange(value) {
        const n = Number(value);
        if (!Number.isFinite(n)) return '<span>—</span>';
        const cls = n > 0 ? "briefing-change--up" : n < 0 ? "briefing-change--down" : "";
        const sign = n > 0 ? "+" : "";
        return `<span class="${cls}">${sign}${n.toFixed(2)}%</span>`;
      }

      function fmtNewsTime(value) {
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) return "";
        return new Intl.DateTimeFormat("ko-KR", {
          timeZone: "Asia/Seoul",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          hour12: false,
        })
          .format(d)
          .replace(/\.$/, "");
      }

      const US_INDEX_ORDER = ["nasdaq", "sp500", "nasdaq-futures"];

      function renderRows(id, rows, getLabel, getValue) {
        $(id).innerHTML = rows && rows.length
          ? rows.map((row) => `<li class="briefing-row"><strong>${escapeHtml(getLabel(row))}</strong><span class="briefing-row__value">${getValue(row)}</span></li>`).join("")
          : '<li class="empty-text">데이터 없음</li>';
      }

      function sortUsIndices(rows) {
        const order = new Map(US_INDEX_ORDER.map((id, i) => [id, i]));
        return [...(rows || [])].sort((a, b) => (order.get(a.id) ?? 99) - (order.get(b.id) ?? 99));
      }

      function fmtPoints(value) {
        const n = Number(value);
        if (!Number.isFinite(n)) return "";
        const sign = n > 0 ? "+" : "";
        return `${sign}${n.toLocaleString("ko-KR", { maximumFractionDigits: 2 })}`;
      }

      function indexLabel(row) {
        const name = escapeHtml(row.name || row.symbol || "");
        if (row.id === "nasdaq-futures" || row.live) {
          return `${name}<span class="briefing-badge">실시간</span>`;
        }
        return name;
      }

      function renderUsMarketIndices(rows, sourceLabel) {
        const sorted = sortUsIndices(rows);
        $("us-market-list").innerHTML = sorted.length
          ? sorted
              .map((row) => {
                const price = row.price ?? row.close;
                const points = row.changePoints;
                const meta =
                  Number.isFinite(Number(points)) && points !== 0
                    ? `<span class="briefing-row__meta">전일 대비 ${fmtPoints(points)}p · ${row.id === "nasdaq-futures" ? "CME 나스닥100 선물" : "나스닥100(NDX) 전일 마감"}</span>`
                    : `<span class="briefing-row__meta">${row.id === "nasdaq-futures" ? "CME 나스닥100 선물 · 장전/야간" : "나스닥100(NDX) 전일 마감"}</span>`;
                return `<li class="briefing-row briefing-row--index">
                  <strong>${indexLabel(row)}</strong>
                  <span class="briefing-row__value"><span>${fmtNumber(price, 0)}</span>${fmtChange(row.changePct)}</span>
                  ${meta}
                </li>`;
              })
              .join("")
          : '<li class="empty-text">데이터 없음</li>';
        const updated = $("us-market-updated");
        if (sourceLabel) {
          updated.hidden = false;
          updated.textContent = sourceLabel;
        } else {
          updated.hidden = true;
          updated.textContent = "";
        }
      }

      function renderUsMarketSub(topStocks, sectors) {
        const stocks = [...(topStocks || [])]
          .filter((row) => Number.isFinite(Number(row.changePct)))
          .sort((a, b) => Math.abs(b.changePct) - Math.abs(a.changePct))
          .slice(0, 4);
        const sectorRows = [...(sectors || [])]
          .filter((row) => Number.isFinite(Number(row.changePct)))
          .sort((a, b) => Math.abs(b.changePct) - Math.abs(a.changePct))
          .slice(0, 3);
        const rows = [
          ...stocks.map((row) => ({
            label: row.symbol,
            value: fmtNumber(row.price, 2),
            changePct: row.changePct,
          })),
          ...sectorRows.map((row) => ({
            label: row.name || row.symbol,
            value: "",
            changePct: row.changePct,
          })),
        ];
        const sub = $("us-market-sub");
        const list = $("us-market-sub-list");
        if (!rows.length) {
          sub.hidden = true;
          return;
        }
        sub.hidden = false;
        list.innerHTML = rows
          .map(
            (row) => `<li class="briefing-row">
              <strong>${escapeHtml(row.label)}</strong>
              <span class="briefing-row__value"><span>${row.value ? escapeHtml(row.value) : "—"}</span>${fmtChange(row.changePct)}</span>
            </li>`
          )
          .join("");
      }

      async function loadUsMarketLive(fallbackIndices, topStocks, sectors) {
        const fallback = sortUsIndices(
          (fallbackIndices || []).map((row) => ({
            ...row,
            price: row.price ?? row.close,
          }))
        );
        try {
          const res = await fetch("/api/us-market-data?action=indices", { cache: "no-store" });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const body = await res.json();
          const rows = sortUsIndices(body.indices || []);
          if (!rows.length) throw new Error("empty indices");
          renderUsMarketIndices(rows, "실시간 갱신");
          return rows;
        } catch (error) {
          console.warn("[briefing] live US indices fallback", error);
          if (fallback.length) renderUsMarketIndices(fallback, "정적 브리핑 데이터");
          return fallback;
        } finally {
          renderUsMarketSub(topStocks, sectors);
        }
      }

      function renderAnalysis(ai) {
        const keyIssues = Array.isArray(ai?.keyIssues) ? ai.keyIssues : [];
        const watchSectors = Array.isArray(ai?.watchSectors) ? ai.watchSectors : [];
        $("ai-analysis").innerHTML = `
          <h3>오늘 주목할 핵심 이슈 3가지</h3>
          ${keyIssues.length ? `<ol>${keyIssues.map((v) => `<li>${escapeHtml(v)}</li>`).join("")}</ol>` : '<p class="empty-text">분석 대기 중</p>'}
          <h3>국내 증시 영향 분석</h3>
          <p>${escapeHtml(ai?.domesticImpact || "분석 대기 중")}</p>
          <h3>오늘 주목 섹터/종목</h3>
          ${watchSectors.length ? `<ul>${watchSectors.map((v) => `<li>${escapeHtml(v)}</li>`).join("")}</ul>` : '<p class="empty-text">분석 대기 중</p>'}
        `;
      }

      function renderNews(rows) {
        const list = Array.isArray(rows) ? rows.slice(0, 20) : [];
        $("news-list").innerHTML = list.length
          ? list.map((n, i) => {
              const summary = n.summary || n.note || "";
              if (n.telegram || summary) {
                return `<details class="briefing-news-card is-telegram">
                  <summary><span>${escapeHtml(n.source || n.channel || "텔레그램")} · ${escapeHtml(fmtNewsTime(n.publishedAt || n.datetime))}</span><strong>${escapeHtml(n.title || n.headline || "제목 없음")}</strong></summary>
                  <p class="briefing-news-summary">${escapeHtml(summary || n.title || n.headline || "")}</p>
                </details>`;
              }
              if (n.url) {
                return `<a class="briefing-news-card" href="${escapeHtml(n.url)}" target="_blank" rel="noopener noreferrer">
                  <span>${escapeHtml(n.source || "뉴스")} · ${escapeHtml(fmtNewsTime(n.publishedAt))}</span>
                  <strong>${escapeHtml(n.title || "제목 없음")}</strong>
                </a>`;
              }
              return `<div class="briefing-news-card">
                <span>${escapeHtml(n.source || "뉴스")} · ${escapeHtml(fmtNewsTime(n.publishedAt || n.datetime))}</span>
                <strong>${escapeHtml(n.title || n.headline || "제목 없음")}</strong>
              </div>`;
            }).join("")
          : '<p class="empty-text">뉴스 없음</p>';
      }

      function renderMacroList(data) {
        const comments = data.aiAnalysis?.marketComments || {};
        const rates = data.forex?.rates || {};
        const commodities = Array.isArray(data.forex?.commodities) ? data.forex.commodities : [];
        const crypto = (Array.isArray(data.crypto?.assets) ? data.crypto.assets : []).find((row) => row.symbol === "BTC");
        const pickCommodity = (id) => commodities.find((row) => row.id === id);
        const rows = [
          { key: "USD/KRW", label: "💱 원/달러 환율", value: rates["USD/KRW"], changePct: null },
          { key: "WTI유가", label: "🛢️ WTI 유가", value: pickCommodity("wti")?.price, changePct: pickCommodity("wti")?.changePct },
          { key: "금", label: "🥇 금시세", value: pickCommodity("gold")?.price, changePct: pickCommodity("gold")?.changePct },
          { key: "BTC", label: "₿ 비트코인", value: crypto?.priceUsd, changePct: crypto?.changePct24h, prefix: "$" },
        ];
        $("forex-list").innerHTML = rows.map((row) => `<li class="briefing-row">
          <strong>${escapeHtml(row.label)}</strong>
          <span class="briefing-row__value"><span>${escapeHtml(row.prefix || "")}${fmtNumber(row.value, row.key === "BTC" ? 0 : 2)}</span>${fmtChange(row.changePct)}</span>
          ${comments[row.key] ? `<small style="grid-column:1/-1;color:var(--text-muted);line-height:1.45">${escapeHtml(comments[row.key])}</small>` : ""}
        </li>`).join("");
      }

      async function loadBriefing() {
        try {
          const data = await tmFetchJson("data/morning-briefing.json");
          $("briefing-updated").textContent = data.updatedAt ? `마지막 업데이트: ${data.updatedAt}` : "미국 마감, 환율, 주요 뉴스";
          const errs = Array.isArray(data.errors) ? data.errors : [];
          if (errs.length || data.aiAnalysis?._fallback) {
            $("masthead-notice").hidden = false;
            $("masthead-notice").textContent =
              errs.some((e) => /credit balance|too low/i.test(String(e)))
                ? "AI 분석 일시 중단(Anthropic 크레딧). 지수·뉴스·실시간 API는 정상 표시됩니다."
                : `브리핑 일부 수집 오류: ${errs[0] || "AI 폴백"}`;
          }
          renderAnalysis(data.aiAnalysis || {});
          await loadUsMarketLive(data.usMarket?.indices, data.topStocks, data.sectors);
          renderRows("top-stocks-list", data.topStocks || [], (r) => r.symbol, (r) => `${fmtNumber(r.price)} ${fmtChange(r.changePct)}`);
          renderRows("sectors-list", data.sectors || [], (r) => r.name || r.symbol, (r) => `<span></span>${fmtChange(r.changePct)}`);
          renderMacroList(data);
          renderNews(data.news || []);
        } catch (error) {
          $("masthead-notice").hidden = false;
          $("masthead-notice").textContent = `브리핑 데이터를 불러오지 못했습니다: ${error instanceof Error ? error.message : error}`;
        }
      }

      loadBriefing();
    </script>
  </body>
</html>
