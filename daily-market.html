<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0d0b08" />
    <title>TotalMoney AI · 매일 시황 기록</title>
    <link rel="icon" type="image/png" href="./assets/totalmoney_ai.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+KR:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./weekly-market.css" />
    <link rel="stylesheet" href="./daily-market.css" />
  </head>
  <body>
    <div class="page">
      <header class="masthead">
        <a class="masthead__brand" href="./daily-market.html" aria-label="TotalMoney AI 홈">
          <img
            class="masthead__logo"
            src="./assets/totalmoney_ai.png"
            alt=""
            width="40"
            height="40"
            decoding="async"
          />
          <span class="masthead__brand-text">
            <span class="masthead__brand-name">TotalMoney AI</span>
            <span class="masthead__brand-tagline">Smarter Financial Decisions</span>
          </span>
        </a>
        <div class="masthead__copy">
          <p class="masthead__kicker">Market Daily</p>
          <h1 class="masthead__title" id="masthead-title">매일 시황 기록</h1>
          <p class="masthead__notice" id="masthead-notice" hidden></p>
          <div class="masthead__meta">
            <span id="masthead-range"></span>
            <span id="masthead-updated"></span>
            <span id="masthead-tz"></span>
          </div>
        </div>
      </header>

      <nav class="day-nav" aria-label="날짜 이동">
        <button type="button" class="day-nav__btn" id="nav-prev" aria-label="이전 영업일">◀</button>
        <label class="day-nav__date">
          <span class="u-visually-hidden">날짜 선택</span>
          <input type="date" id="nav-date" />
        </label>
        <button type="button" class="day-nav__btn" id="nav-next" aria-label="다음 영업일">▶</button>
        <button type="button" class="day-nav__today" id="nav-today">오늘</button>
        <span class="day-nav__spacer"></span>
        <a class="day-nav__cross" href="./weekly-market.html">주간 일정 →</a>
      </nav>

      <main class="daily-main">
        <section class="daily-detail" id="daily-detail" aria-live="polite">
          <article class="day-sheet" id="day-sheet">
            <aside class="day-rail" aria-hidden="true">
              <span class="day-rail__md" id="rail-md">—</span>
              <span class="day-rail__dow" id="rail-dow"></span>
            </aside>
            <div class="day-body" id="day-body">
              <div class="day-prep" id="day-prep" hidden>
                <p class="day-prep__icon" aria-hidden="true">⏳</p>
                <p class="day-prep__title" id="day-prep-title">오늘 시황 데이터 준비 중입니다</p>
                <p class="day-prep__hint">장 마감 후 자동으로 업데이트됩니다.</p>
              </div>

              <section class="day-block">
                <h3 class="day-block__label">시황 요약</h3>
                <div id="day-summary" class="daily-summary"></div>
              </section>

              <section class="day-block">
                <h3 class="day-block__label">지수 종가</h3>
                <div id="day-indexes" class="index-row"></div>
              </section>

              <section class="day-block">
                <h3 class="day-block__label">특징주</h3>
                <div id="day-notable"></div>
              </section>

              <section class="day-block">
                <h3 class="day-block__label">
                  상승률 TOP 30
                  <span class="day-block__sub" id="day-topgainers-meta"></span>
                </h3>
                <div id="day-topgainers"></div>
              </section>

              <section class="day-block">
                <h3 class="day-block__label">테마별 강세</h3>
                <div id="day-themes" class="theme-list"></div>
              </section>

              <section class="day-block">
                <h3 class="day-block__label">주요 뉴스</h3>
                <div id="day-news"></div>
              </section>
            </div>
          </article>
        </section>

        <aside class="daily-archive" aria-label="날짜별 아카이브">
          <header class="archive-head">
            <button type="button" class="archive-nav" id="archive-prev" aria-label="이전 달">◀</button>
            <h2 class="archive-title" id="archive-title">—</h2>
            <button type="button" class="archive-nav" id="archive-next" aria-label="다음 달">▶</button>
          </header>
          <div class="archive-dow">
            <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
          </div>
          <div class="archive-grid" id="archive-grid" role="grid"></div>
          <p class="archive-legend"><span class="archive-legend__dot"></span>기록 있음 · <span class="archive-legend__today">오늘</span></p>
        </aside>
      </main>

    </div>

    <script src="./daily-market.js"></script>
  </body>
</html>
