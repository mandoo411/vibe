<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0d0b08" />
    <title>TotalMoney AI · 홈</title>
    <link rel="icon" type="image/png" href="./assets/totalmoney_ai.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link

      rel="stylesheet"
    />
    <link rel="stylesheet" href="./weekly-market.css" />
    <link rel="stylesheet" href="./site-nav.css" />
    <link rel="stylesheet" href="./hub.css" />
  </head>
  <body>
    <div class="page page--hub">
      <header class="tm-site-header">
        <a class="tm-site-brand" href="./index.html" aria-label="TotalMoney AI 홈">
          <img
            class="tm-site-brand__logo"
            src="./assets/totalmoney_ai.png"
            alt=""
            width="40"
            height="40"
            decoding="async"
          />
          <span class="tm-site-brand__text">
            <span class="tm-site-brand__name">TotalMoney AI</span>
            <span class="tm-site-brand__tagline">Smarter Financial Decisions</span>
          </span>
        </a>

        <nav class="tm-site-nav" aria-label="주요 메뉴">
          <a class="tm-site-nav__link" href="./index.html" aria-current="page">홈</a>
          <a class="tm-site-nav__link" href="./daily-market.html">시황</a>
          <a class="tm-site-nav__link" href="./realtime.html">전광판</a>
          <a class="tm-site-nav__link" href="./weekly-market.html">주간일정</a>
        </nav>
      </header>

      <header class="hub-hero">
        <p class="hub-hero__kicker">Market Hub</p>
        <h1 class="hub-hero__title">한눈에 보는 시장 도구</h1>
      </header>

      <div class="hub-grid" role="list">
        <a class="hub-card" href="./daily-market.html" role="listitem">
          <span class="hub-card__icon" aria-hidden="true"
            ><svg viewBox="0 0 40 40" width="40" height="40" focusable="false">
              <g fill="#C9A84C">
                <rect x="3" y="3" width="6" height="6" rx="0.8" fill-opacity="0.45" />
                <rect x="11" y="3" width="6" height="6" rx="0.8" fill-opacity="0.85" />
                <rect x="19" y="3" width="6" height="6" rx="0.8" fill-opacity="0.55" />
                <rect x="27" y="3" width="6" height="6" rx="0.8" fill-opacity="1" />
                <rect x="3" y="11" width="6" height="6" rx="0.8" fill-opacity="0.7" />
                <rect x="11" y="11" width="6" height="6" rx="0.8" fill-opacity="0.4" />
                <rect x="19" y="11" width="6" height="6" rx="0.8" fill-opacity="0.9" />
                <rect x="27" y="11" width="6" height="6" rx="0.8" fill-opacity="0.5" />
                <rect x="3" y="19" width="6" height="6" rx="0.8" fill-opacity="1" />
                <rect x="11" y="19" width="6" height="6" rx="0.8" fill-opacity="0.55" />
                <rect x="19" y="19" width="6" height="6" rx="0.8" fill-opacity="0.35" />
                <rect x="27" y="19" width="6" height="6" rx="0.8" fill-opacity="0.75" />
                <rect x="3" y="27" width="6" height="6" rx="0.8" fill-opacity="0.5" />
                <rect x="11" y="27" width="6" height="6" rx="0.8" fill-opacity="0.95" />
                <rect x="19" y="27" width="6" height="6" rx="0.8" fill-opacity="0.65" />
                <rect x="27" y="27" width="6" height="6" rx="0.8" fill-opacity="0.4" />
              </g>
            </svg></span>
          <h2 class="hub-card__title">매일 시황 기록</h2>
          <p class="hub-card__desc">KIS+Naver+Claude AI 분석</p>
          <div class="hub-card__meta">
            <span class="hub-card__status hub-card__status--live">운영중</span>
            <span class="hub-card__chev" aria-hidden="true">→</span>
          </div>
        </a>

        <a class="hub-card" href="./realtime.html" role="listitem">
          <span class="hub-card__icon hub-card__icon--live" aria-hidden="true">LIVE</span>
          <h2 class="hub-card__title">실시간 전광판</h2>
          <p class="hub-card__desc">시총/상승률/거래대금 TOP50 실시간</p>
          <div class="hub-card__meta">
            <span class="hub-card__status hub-card__status--live">운영중</span>
            <span class="hub-card__chev" aria-hidden="true">→</span>
          </div>
        </a>

        <a class="hub-card" href="./weekly-market.html" role="listitem">
          <span class="hub-card__icon" aria-hidden="true"
            ><svg viewBox="0 0 40 40" width="40" height="40" focusable="false">
              <rect
                x="7"
                y="9"
                width="26"
                height="24"
                rx="2.5"
                fill="none"
                stroke="#C9A84C"
                stroke-width="1.5"
              />
              <path d="M7 15h26" stroke="#C9A84C" stroke-width="1.5" fill="none" />
              <circle cx="12" cy="12" r="1.2" fill="#C9A84C" />
              <circle cx="20" cy="12" r="1.2" fill="#C9A84C" />
              <circle cx="28" cy="12" r="1.2" fill="#C9A84C" />
              <path d="M12 19h4M19 19h4M26 19h4M12 23h4M19 23h4M26 23h4M12 27h4M19 27h4" stroke="#C9A84C" stroke-width="1.25" stroke-linecap="round" />
            </svg></span>
          <h2 class="hub-card__title">주간 일정</h2>
          <p class="hub-card__desc">이번주 주요 경제 일정</p>
          <div class="hub-card__meta">
            <span class="hub-card__status hub-card__status--live">운영중</span>
            <span class="hub-card__chev" aria-hidden="true">→</span>
          </div>
        </a>

        <div class="hub-card hub-card--soon" role="listitem" aria-disabled="true">
          <span class="hub-card__icon" aria-hidden="true"
            ><svg viewBox="0 0 40 40" width="40" height="40" focusable="false">
              <line x1="20" y1="4" x2="20" y2="10" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round" />
              <line x1="9" y1="9" x2="13" y2="13" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round" />
              <line x1="31" y1="9" x2="27" y2="13" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round" />
              <line x1="4" y1="18" x2="9" y2="18" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round" />
              <line x1="36" y1="18" x2="31" y2="18" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round" />
              <path
                d="M 5 24 Q 20 7 35 24"
                fill="none"
                stroke="#C9A84C"
                stroke-width="2.25"
                stroke-linecap="round"
              />
              <line x1="5" y1="24" x2="35" y2="24" stroke="#C9A84C" stroke-width="1.25" stroke-linecap="round" />
            </svg></span>
          <h2 class="hub-card__title">장전 브리핑</h2>
          <p class="hub-card__desc">미국 마감, 환율, 주요 뉴스</p>
          <div class="hub-card__meta">
            <span class="hub-card__status hub-card__status--soon">준비중</span>
          </div>
        </div>

        <div class="hub-card hub-card--soon" role="listitem" aria-disabled="true">
          <span class="hub-card__icon" aria-hidden="true"
            ><svg viewBox="0 0 40 40" width="40" height="40" focusable="false">
              <line x1="9" y1="7" x2="9" y2="33" stroke="#C9A84C" stroke-width="2" stroke-linecap="round" />
              <rect
                x="11"
                y="8"
                width="22"
                height="25"
                rx="1.5"
                fill="none"
                stroke="#C9A84C"
                stroke-width="1.5"
              />
              <line x1="11" y1="15" x2="33" y2="15" stroke="#C9A84C" stroke-width="1" stroke-linecap="round" />

              <line x1="11" y1="27" x2="33" y2="27" stroke="#C9A84C" stroke-width="1" stroke-linecap="round" />
              <rect x="12" y="9" width="9" height="7" rx="0.8" fill="none" stroke="#C9A84C" stroke-width="1" />
              <circle cx="14.5" cy="11.5" r="0.9" fill="#C9A84C" />
              <circle cx="17.5" cy="11.5" r="0.9" fill="#C9A84C" />
              <circle cx="16" cy="13.5" r="0.9" fill="#C9A84C" />
            </svg></span>
          <h2 class="hub-card__title">미국 주식</h2>
          <p class="hub-card__desc">나스닥·S&amp;P500 실시간</p>
          <div class="hub-card__meta">
            <span class="hub-card__status hub-card__status--soon">준비중</span>
          </div>
        </div>

        <div class="hub-card hub-card--soon" role="listitem" aria-disabled="true">
          <span class="hub-card__icon" aria-hidden="true"
            ><svg viewBox="0 0 40 40" width="40" height="40" focusable="false">
              <!-- 동전 면 -->
              <circle cx="20" cy="20" r="11" fill="rgba(201, 168, 76, 0.12)" stroke="none" />
              <!-- 안쪽 원 링 -->
              <circle
                cx="20"
                cy="20"
                r="11.5"
                fill="none"
                stroke="#C9A84C"
                stroke-width="1.5"
              />
              <!-- 바깥 링: 두꺼운 점선 테두리 -->
              <circle
                cx="20"
                cy="20"
                r="15.35"
                fill="none"
                stroke="#C9A84C"
                stroke-width="2.85"
                stroke-dasharray="2 3.15"
                stroke-linecap="round"
              />
              <text
                x="20"
                y="20"
                text-anchor="middle"
                dominant-baseline="central"
                fill="#C9A84C"
                font-family="JetBrains Mono, system-ui, sans-serif"
                font-size="14"
                font-weight="700"
              >
                ₿
              </text>
            </svg></span>
          <h2 class="hub-card__title">암호화폐</h2>
          <p class="hub-card__desc">BTC/ETH/알트코인 시황</p>
          <div class="hub-card__meta">
            <span class="hub-card__status hub-card__status--soon">준비중</span>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
