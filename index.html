<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0d0b08" />
    <title>TotalMoney AI · 홈</title>
    <link rel="icon" type="image/png" href="./assets/totalmoney_ai.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+KR:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./weekly-market.css" />
    <link rel="stylesheet" href="./site-nav.css" />
    <link rel="stylesheet" href="./hub.css" />
  </head>
  <body>
    <div class="page page--hub">
      <a class="masthead__brand" href="./index.html" aria-label="TotalMoney AI 홈">
        <img
          class="masthead__logo"
          src="./assets/totalmoney_ai.png"
          alt=""
          width="40"
          height="40"
          decoding="async"
        />
        <span class="masthead__brand-text">
          <span class="masthead__brand-name">TotalMoney AI</span>
          <span class="masthead__brand-tagline">Smarter Financial Decisions</span>
        </span>
      </a>

      <nav class="tm-site-nav" aria-label="주요 메뉴">
        <a class="tm-site-nav__link" href="./index.html" aria-current="page">홈</a>
        <a class="tm-site-nav__link" href="./daily-market.html">시황</a>
        <a class="tm-site-nav__link" href="./realtime.html">전광판</a>
        <a class="tm-site-nav__link" href="./weekly-market.html">주간일정</a>
      </nav>

      <header class="hub-hero">
        <p class="hub-hero__kicker">Market Hub</p>
        <h1 class="hub-hero__title">한눈에 보는 시장 도구</h1>
      </header>

      <div class="hub-grid" role="list">
        <a class="hub-card" href="./daily-market.html" role="listitem">
          <span class="hub-card__icon hub-card__icon--sym" aria-hidden="true">₩</span>
          <h2 class="hub-card__title">매일 시황 기록</h2>
          <p class="hub-card__desc">KIS+Naver+Claude AI 분석</p>
          <div class="hub-card__meta">
            <span class="hub-card__status hub-card__status--live">운영중</span>
            <span class="hub-card__chev" aria-hidden="true">→</span>
          </div>
        </a>

        <a class="hub-card" href="./realtime.html" role="listitem">
          <span class="hub-card__icon hub-card__icon--live" aria-hidden="true">LIVE</span>
          <h2 class="hub-card__title">실시간 전광판</h2>
          <p class="hub-card__desc">시총/상승률/거래대금 TOP50 실시간</p>
          <div class="hub-card__meta">
            <span class="hub-card__status hub-card__status--live">운영중</span>
            <span class="hub-card__chev" aria-hidden="true">→</span>
          </div>
        </a>

        <a class="hub-card" href="./weekly-market.html" role="listitem">
          <span class="hub-card__icon" aria-hidden="true">CAL</span>
          <h2 class="hub-card__title">주간 일정</h2>
          <p class="hub-card__desc">이번주 주요 경제 일정</p>
          <div class="hub-card__meta">
            <span class="hub-card__status hub-card__status--live">운영중</span>
            <span class="hub-card__chev" aria-hidden="true">→</span>
          </div>
        </a>

        <div class="hub-card hub-card--soon" role="listitem" aria-disabled="true">
          <span class="hub-card__icon" aria-hidden="true">AM</span>
          <h2 class="hub-card__title">장전 브리핑</h2>
          <p class="hub-card__desc">미국 마감, 환율, 주요 뉴스</p>
          <div class="hub-card__meta">
            <span class="hub-card__status hub-card__status--soon">준비중</span>
          </div>
        </div>

        <div class="hub-card hub-card--soon" role="listitem" aria-disabled="true">
          <span class="hub-card__icon" aria-hidden="true">US</span>
          <h2 class="hub-card__title">미국 주식</h2>
          <p class="hub-card__desc">나스닥·S&amp;P500 실시간</p>
          <div class="hub-card__meta">
            <span class="hub-card__status hub-card__status--soon">준비중</span>
          </div>
        </div>

        <div class="hub-card hub-card--soon" role="listitem" aria-disabled="true">
          <span class="hub-card__icon" aria-hidden="true">BTC</span>
          <h2 class="hub-card__title">암호화폐</h2>
          <p class="hub-card__desc">BTC/ETH/알트코인 시황</p>
          <div class="hub-card__meta">
            <span class="hub-card__status hub-card__status--soon">준비중</span>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
