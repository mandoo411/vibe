  <head>

    <style>
      .live-wrap {
        display: grid;
        gap: 16px;
      }
      .live-status {
        padding: 9px 12px;
        border: 1px solid var(--border-strong);
        border-radius: var(--radius);
        background: var(--surface-bar);
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-muted);
        line-height: 1.6;
      }
      .live-countdown {
        color: var(--accent-bright);
        font-weight: 600;
      }
      .live-timeline-panel {
        padding: 12px 14px;
        border: 1px solid var(--border-strong);
        border-radius: var(--radius);
        background: var(--surface-bar);
      }
      .live-timeline-panel .live-section__title {
        margin-bottom: 10px;
      }
      .live-timeline {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 5px;
      }
      .live-timeline__btn {
        appearance: none;
        margin: 0;
        padding: 7px 2px;
        border: 1px solid var(--border);
        border-radius: 4px;
        background: var(--bg-tertiary);
        color: var(--text-dim);
        font-family: var(--font-mono);
        font-size: 10px;
        line-height: 1.2;
        cursor: pointer;
        text-align: center;
      }
      .live-timeline__btn--done {
        border-color: var(--up-border);
        color: var(--up-text);
      }
      .live-timeline__btn--active {
        border-color: var(--accent-bright);
        color: var(--accent-bright);
        background: var(--sheet-accent-soft);
        font-weight: 700;
      }
      .live-timeline__btn--wait {
        border-color: var(--wait-border);
        color: var(--wait-text);
      }
      .live-timeline__btn:disabled {
        opacity: 0.32;
        cursor: not-allowed;
      }
      .live-timeline__btn:not(:disabled):not(.live-timeline__btn--active):hover {
        border-color: var(--border-strong);
        color: var(--text-muted);
      }
      .live-news-list,
      .live-theme-list {
        margin: 0;
        padding: 0;
        list-style: none;
      }
      .live-news-list li {
        padding: 0 12px 10px;
        border-bottom: 1px solid var(--border);
      }
      .live-news-list li:last-child {
        border-bottom: 0;
      }
      .live-news-details {
        border: 0;
        margin: 10px 0 0;
      }
      .live-news-summary {
        list-style: none;
        cursor: pointer;
        padding: 0;
      }
      .live-news-summary::-webkit-details-marker {
        display: none;
      }
      .live-news-summary::marker {
        content: "";
      }
      .live-news-card {
        border: 1px solid var(--sheet-accent-border);
        border-radius: 8px;
        background: var(--sheet-accent-gradient);
        padding: 10px 12px 8px;
      }
      .live-news-channel {
        display: block;
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--accent-bright);
        letter-spacing: 0.04em;
        margin-bottom: 6px;
      }
      .live-news-headline {
        display: block;
        font-size: 13px;
        font-weight: 600;
        line-height: 1.5;
        color: var(--text);
      }
      .live-news-preview {
        margin-top: 8px;
        font-size: 12px;
        line-height: 1.55;
        color: var(--text-muted);
        white-space: pre-wrap;
      }
      .live-news-link {
        display: inline-block;
        margin-top: 10px;
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--accent-bright);
        text-decoration: none;
      }
      .live-news-link:hover {
        text-decoration: underline;
      }
      .live-news-preview ul {
        margin: 0;
        padding-left: 1.1em;
      }
      .live-news-preview li {
        margin: 4px 0;
      }
      .live-news-hint {
        display: inline-block;
        margin-top: 8px;
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--accent-bright);
      }
      .live-news-details[open] .live-news-hint {
        display: none;
      }
      .live-news-body {
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px dashed var(--border);
        font-size: 13px;
        line-height: 1.65;
        color: var(--text);
      }
      .live-news-body ul {
        margin: 0;
        padding-left: 1.15em;
      }
      .live-news-body li {
        margin: 6px 0;
      }
      .live-news-meta {
        margin-top: 8px;
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--text-dim);
        text-align: right;
      }
      .live-news-item--static .live-news-card {
        cursor: default;
      }
      .live-news-section-label {
        margin: 14px 12px 8px;
        font-size: 12px;
        font-weight: 600;
        color: var(--text-muted);
        letter-spacing: 0.02em;
      }
      .live-press-news-card {
        display: block;
        border: 1px solid var(--sheet-accent-border);
        border-radius: 8px;
        background: var(--sheet-accent-gradient);
        padding: 10px 12px;
        text-decoration: none;
        color: inherit;
        transition: border-color 0.15s ease;
      }
      a.live-press-news-card:hover {
        border-color: var(--sheet-accent-border-strong);
        text-decoration: none;
      }
      .live-press-news-card--static {
        cursor: default;
      }
      .live-press-news-card__source {
        display: block;
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--accent-bright);
        margin-bottom: 4px;
      }
      .live-press-news-card__title {
        display: block;
        font-size: 13px;
        font-weight: 600;
        line-height: 1.45;
        color: var(--text);
      }
      .live-press-news-card__link {
        display: inline-block;
        margin-top: 8px;
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--accent-bright);
      }
      .live-theme-list li {
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        font-size: 13px;
        line-height: 1.55;
        color: var(--text);
      }
      .live-theme-list li:last-child {
        border-bottom: 0;
      }
      .live-theme-list small {
        display: block;
        margin-top: 4px;
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--text-dim);
      }
      .live-index-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }
      .live-index-card,
      .live-card {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg-panel);
        box-shadow: var(--shadow);
      }
      .live-index-card {
        padding: 14px 16px;
        font-family: var(--font-mono);
      }
      .live-index-card__name {
        font-size: 11px;
        color: var(--text-muted);
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      .live-index-card__value {
        margin-top: 6px;
        font-size: 24px;
        font-weight: 700;
        color: var(--text);
      }
      .live-index-card__change,
      .live-delta {
        font-family: var(--font-mono);
        font-size: 12px;
        font-weight: 600;
      }
      .live-delta--up {
        color: var(--up-color);
      }
      .live-delta--down {
        color: var(--down-color);
      }
      .live-delta--flat {
        color: var(--text-dim);
      }
      .live-section__title {
        margin: 0 0 8px;
        font-size: 13px;
        color: var(--accent-bright);
        letter-spacing: 0.08em;
      }
      .live-main-report {
        padding: 16px;
        border-color: var(--sheet-accent-border-strong);
        box-shadow:
          var(--sheet-shadow),
          inset 0 1px 0 var(--sheet-accent-soft);
      }
      .live-report-head {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 12px;
        font-family: var(--font-mono);
        color: var(--text-muted);
        font-size: 12px;
      }
      .live-report-time {
        color: var(--accent-bright);
        font-weight: 700;
      }
      .live-analysis {
        white-space: pre-wrap;
        line-height: 1.75;
        color: var(--text);
        font-size: 14px;
      }
      .live-table-card {
        overflow: hidden;
      }
      .live-table {
        width: 100%;
        border-collapse: collapse;
        font-family: var(--font-mono);
        font-size: 12px;
      }
      .live-table th,
      .live-table td {
        padding: 8px 10px;
        border-bottom: 1px solid var(--border);
      }
      .live-table th {
        text-align: left;
        color: var(--text-dim);
        background: var(--bg-tertiary);
        font-size: 10px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .live-table .num {
        text-align: right;
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }
      .live-empty {
        padding: 16px;
        color: var(--text-muted);
        border: 1px dashed var(--border-strong);
        border-radius: var(--radius);
        background: var(--accent-dim);
      }
      @media (max-width: 768px) {
        .live-index-grid {
          grid-template-columns: 1fr;
        }
        .live-table {
          font-size: 11px;
        }
        .live-table th,
        .live-table td {
          padding: 7px 6px;
        }
        .live-hide-mobile {
          display: none;
        }
      }
    </style>
  </head>

    <script>
      (() => {
        const DATA_URL = tmDataUrl("data/live-report.json");
        const INDEX_API = "./api/kis-realtime-data?action=index";
        const TIMES = ["09:00", "09:30", "10:00", "10:30", "11:00", "11:30", "12:00", "12:30", "13:00", "13:30", "14:00", "14:30", "15:00", "15:30"];
        const WD = ["일", "월", "화", "수", "목", "금", "토"];
        const state = { data: { date: "", reports: [] }, selected: "" };

        const $ = (id) => document.getElementById(id);
        const escapeHtml = (s) => String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        const toNum = (v) => {
          if (v == null || v === "") return null;
          const n = Number(String(v).replace(/,/g, ""));
          return Number.isFinite(n) ? n : null;
        };
        const fmtNum = (v, digits = 0) => {
          const n = toNum(v);
          return n == null ? "-" : n.toLocaleString("ko-KR", { maximumFractionDigits: digits, minimumFractionDigits: digits });
        };
        const fmtPct = (v) => {
          const n = toNum(v);
          if (n == null) return "-";
          return `${n > 0 ? "+" : ""}${n.toFixed(2)}%`;
        };
        const deltaClass = (v) => {
          const n = toNum(v);
          if (!n) return "live-delta--flat";
          return n > 0 ? "live-delta--up" : "live-delta--down";
        };
        const seoulNow = () => new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Seoul" }));
        const seoulYmd = (d = seoulNow()) => {
          const y = d.getFullYear();
          const m = String(d.getMonth() + 1).padStart(2, "0");
          const day = String(d.getDate()).padStart(2, "0");
          return `${y}-${m}-${day}`;
        };
        const kstLabel = (d = seoulNow()) => `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, "0")}.${String(d.getDate()).padStart(2, "0")} ${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")} KST`;
        const marketStatus = () => {
          const now = seoulNow();
          const day = now.getDay();
          const minutes = now.getHours() * 60 + now.getMinutes();
          if (day === 0 || day === 6) return "오늘은 주말 휴장입니다";
          if (minutes < 9 * 60) return "장 시작을 기다리는 중입니다 (09:00)";
          if (minutes > 15 * 60 + 30) return "오늘 장이 마감되었습니다";
          return "장중 실시간 리포트 업데이트 중";
        };
        const todayReports = () => {
          const today = seoulYmd();
          if (state.data.date !== today) return [];
          return Array.isArray(state.data.reports) ? state.data.reports : [];
        };
        const dataDateMismatch = () => {
          const today = seoulYmd();
          return Boolean(state.data.date && state.data.date !== today);
        };
        const slotMinutes = (time) => {
          const [h, m] = time.split(":").map(Number);
          return h * 60 + m;
        };
        const nextSlotTime = () => {
          const now = seoulNow();
          const minutes = now.getHours() * 60 + now.getMinutes();
          for (const time of TIMES) {
            if (slotMinutes(time) > minutes) return time;
          }
          return null;
        };
        const countdownLabel = () => {
          const next = nextSlotTime();
          if (!next) return "";
          const now = seoulNow();
          const target = new Date(now);
          const [h, m] = next.split(":").map(Number);
          target.setHours(h, m, 0, 0);
          const diff = target.getTime() - now.getTime();
          if (diff <= 0) return `곧 ${next} 리포트 업데이트`;
          const min = Math.floor(diff / 60000);
          const sec = Math.floor((diff % 60000) / 1000);
          return `다음 업데이트 ${next}까지 ${min}분 ${sec}초`;
        };
        const reportMap = () => new Map(todayReports().map((r) => [r.time, r]));
        const latestReport = () => {
          const reports = todayReports();
          if (!reports.length) return null;
          const now = seoulNow();
          const minutes = now.getHours() * 60 + now.getMinutes();
          const currentSlot = TIMES.filter((t) => slotMinutes(t) <= minutes).at(-1);
          if (currentSlot && reports.some((r) => r.time === currentSlot)) {
            return reports.find((r) => r.time === currentSlot);
          }
          return [...reports].sort((a, b) => String(a.time).localeCompare(String(b.time))).at(-1) || null;
        };

        function renderIndexes(indexes) {
          const latest = latestReport();
          const fallback = latest
            ? [
                { label: "코스피", value: latest.kospi && latest.kospi.value, changePct: latest.kospi && latest.kospi.change },
                { label: "코스닥", value: latest.kosdaq && latest.kosdaq.value, changePct: latest.kosdaq && latest.kosdaq.change },
              ]
            : [];
          const rows = Array.isArray(indexes) && indexes.length ? indexes : fallback;
          $("live-indexes").innerHTML = rows.map((row) => `<div class="live-index-card">
            <div class="live-index-card__name">${escapeHtml(row.label || row.name)}</div>
            <div class="live-index-card__value">${escapeHtml(row.value || fmtNum(row.price, 2))}</div>
            <div class="live-index-card__change live-delta ${deltaClass(row.changePct ?? row.change)}">${escapeHtml(fmtPct(row.changePct ?? row.change))}</div>
          </div>`).join("");
        }

        function renderTimeline() {
          const map = reportMap();
          const now = seoulNow();
          const minutes = now.getHours() * 60 + now.getMinutes();
          const el = $("live-timeline");
          if (!el) return;
          el.innerHTML = TIMES.map((time) => {
            const has = map.has(time);
            const due = slotMinutes(time) <= minutes;
            const active = state.selected === time;
            let cls = "live-timeline__btn";
            if (active) cls += " live-timeline__btn--active";
            else if (has) cls += " live-timeline__btn--done";
            else if (due) cls += " live-timeline__btn--wait";
            return `<button type="button" class="${cls}" role="tab" data-time="${time}" aria-selected="${active ? "true" : "false"}" ${has ? "" : "disabled"}>${time}</button>`;
          }).join("");
          el.querySelectorAll("[data-time]").forEach((btn) => {
            btn.addEventListener("click", () => {
              if (btn.disabled) return;
              state.selected = btn.getAttribute("data-time");
              render();
            });
          });
        }

        function parseNewsText(text) {
          const raw = String(text || "").trim();
          if (!raw) return { headline: "", bullets: [], full: "" };
          const parts = raw.split(/\s*•\s*/).map((s) => s.trim()).filter(Boolean);
          return {
            headline: parts[0] || raw,
            bullets: parts.slice(1),
            full: raw,
          };
        }

        function formatKstTime(iso) {
          if (!iso) return "";
          try {
            return new Intl.DateTimeFormat("ko-KR", {
              timeZone: "Asia/Seoul",
              hour: "2-digit",
              minute: "2-digit",
              hour12: false,
            }).format(new Date(iso));
          } catch {
            return "";
          }
        }

        function extractFirstUrl(text) {
          const m = String(text || "").match(/https?:\/\/[^\s<>'")\]]+/i);
          return m ? m[0].replace(/[.,;:!?)]+$/, "") : "";
        }

        function previewText(text, max = 100) {
          const s = String(text || "").replace(/\s+/g, " ").trim();
          if (s.length <= max) return s;
          return `${s.slice(0, max)}…`;
        }

        function newsItemHtml(item) {
          const { headline, bullets, full } = parseNewsText(item.text);
          const time = formatKstTime(item.date);
          const channel = item.channel || "채널";
          const bodyPlain = bullets.length ? bullets.join("\n") : full;
          const articleUrl = extractFirstUrl(full);
          const preview = previewText(bodyPlain, 100);
          const canExpand = bodyPlain.length > 100;

          const bodyHtml = bullets.length
            ? `<ul>${bullets.map((b) => `<li>${escapeHtml(b)}</li>`).join("")}</ul>`
            : `<p>${escapeHtml(full)}</p>`;
          const linkHtml = articleUrl
            ? `<a class="live-news-link" href="${escapeHtml(articleUrl)}" target="_blank" rel="noopener noreferrer">원문 보기 →</a>`
            : "";

          const cardInner = `
                  <span class="live-news-channel">${escapeHtml(channel)}</span>
                  <span class="live-news-headline">${escapeHtml(headline)}</span>
                  ${preview ? `<p class="live-news-preview">${escapeHtml(preview)}</p>` : ""}
                  ${canExpand ? '<span class="live-news-hint">탭하여 전체 보기 ▾</span>' : ""}`;

          if (!canExpand) {
            return `<li class="live-news-item live-news-item--static">
              <div class="live-news-card">${cardInner}${linkHtml}</div>
              <div class="live-news-meta">${escapeHtml(time)} · ${escapeHtml(channel)}</div>
            </li>`;
          }

          return `<li>
            <details class="live-news-details">
              <summary class="live-news-summary">
                <div class="live-news-card">${cardInner}</div>
              </summary>
              <div class="live-news-body">${bodyHtml}${linkHtml}</div>
              <div class="live-news-meta">${escapeHtml(time)} · ${escapeHtml(channel)}</div>
            </details>
          </li>`;
        }

        function pressNewsItemHtml(item) {
          const title = item.title || "제목 없음";
          const url = item.url || "";
          const time = formatKstTime(item.pubDate || item.publishedAt);
          const source = item.source || "뉴스";
          const inner = `
              <span class="live-press-news-card__source">${escapeHtml(source)} · ${escapeHtml(time)}</span>
              <span class="live-press-news-card__title">${escapeHtml(title)}</span>
              ${url ? '<span class="live-press-news-card__link">원문 보기 →</span>' : ""}`;
          if (url) {
            return `<li>
            <a class="live-press-news-card" href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">${inner}</a>
          </li>`;
          }
          return `<li><div class="live-press-news-card live-press-news-card--static">${inner}</div></li>`;
        }

        function renderExtras(selected) {
          const news = Array.isArray(selected?.telegramMessages) ? selected.telegramMessages.slice(0, 12) : [];
          $("live-news").innerHTML = news.length
            ? news.map((item) => newsItemHtml(item)).filter(Boolean).join("")
            : '<li class="live-empty">채널 뉴스 준비 중</li>';
          const pressNews = Array.isArray(selected?.pressNews)
            ? selected.pressNews
            : Array.isArray(selected?.siteNews)
              ? selected.siteNews.map((row) => ({
                  ...row,
                  pubDate: row.pubDate || row.publishedAt,
                }))
              : [];
          const pressEl = $("live-press-news");
          if (pressEl) {
            pressEl.innerHTML = pressNews.length
              ? pressNews
                  .slice(0, 20)
                  .map((item) => pressNewsItemHtml(item))
                  .filter(Boolean)
                  .join("")
              : '<li class="live-empty">언론사 뉴스 준비 중 (다음 리포트 생성 시 반영)</li>';
          }
          const themes = Array.isArray(selected?.themes) ? selected.themes : [];
          $("live-themes").innerHTML = themes.length
            ? themes
                .map((theme) => {
                  const msgs = (theme.messages || []).slice(0, 3).join(" · ");
                  return `<li><strong>${escapeHtml(theme.name || "테마")}</strong> ${escapeHtml(msgs)}</li>`;
                })
                .join("")
            : '<li class="live-empty">테마 분석 준비 중</li>';
        }

        function renderReport() {
          const selected = reportMap().get(state.selected) || latestReport();
          if (!selected) {
            $("live-report-time").textContent = "-";
            $("live-analysis").textContent = "아직 생성된 라이브 리포트가 없습니다.";
            renderExtras(null);
            return;
          }
          $("live-report-time").textContent = `${selected.time} 리포트`;
          $("live-analysis").textContent = selected.aiAnalysis || "AI 분석 준비 중입니다.";
          renderExtras(selected);
        }

        function renderStatusOnly() {
          const cd = countdownLabel();
          const map = reportMap();
          const now = seoulNow();
          const minutes = now.getHours() * 60 + now.getMinutes();
          const missing = TIMES.filter((t) => slotMinutes(t) <= minutes && !map.has(t));
          let status = marketStatus();
          if (dataDateMismatch()) {
            status += ` · 데이터 날짜 ${state.data.date} (오늘 ${seoulYmd()} 리포트 생성 대기 — Actions 실행 중이면 곧 반영)`;
          }
          if (cd) status += ` · ${cd}`;
          if (missing.length) status += ` · 미발행: ${missing.join(", ")}`;
          $("live-status").innerHTML = `${escapeHtml(status)}${cd ? `<br><span class="live-countdown">${escapeHtml(cd)}</span>` : ""}`;
          renderTimeline();
          const d = seoulYmd();
          const latest = latestReport();
          $("live-updated").textContent = `마지막 업데이트: ${d.replaceAll("-", ".")} ${latest ? latest.time : "--:--"} KST · 30분 슬롯`;
        }

        function render() {
          renderStatusOnly();
          renderReport();
        }

        async function load() {
          try {
            const [dataRes, indexRes] = await Promise.allSettled([
              tmFetchJson("data/live-report.json"),
              fetch(`${INDEX_API}&t=${Date.now()}`, { cache: "no-store" }).then((r) => r.json()),
            ]);
            if (dataRes.status === "fulfilled") state.data = dataRes.value || state.data;
            const latest = latestReport();
            const prev = state.selected;
            state.selected = prev && reportMap().has(prev) ? prev : latest ? latest.time : "";
            renderIndexes(indexRes.status === "fulfilled" ? indexRes.value.indexes : null);
            render();
          } catch (error) {
            $("live-status").textContent = `데이터 로딩 실패: ${error.message || error}`;
            renderIndexes(null);
            render();
          }
        }

        load();
        setInterval(load, 60 * 1000);
        setInterval(() => {
          if (state.data.date === seoulYmd()) renderStatusOnly();
        }, 1000);
      })();
    </script>
  </body>
</html>
