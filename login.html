<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#07264b" />
    <title>TotalMoney AI · 로그인</title>
    <link rel="apple-touch-icon" href="/assets/icon-t-180.png?v=6" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icon-t-32.png?v=6" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg?v=6" />
    <link rel="shortcut icon" href="/favicon.ico?v=6" />
    <link rel="manifest" href="/site.webmanifest?v=6" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="./theme.js"></script>
    <script src="./site-shell.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./assets/auth-config.js"></script>
    <script src="./assets/auth.js"></script>
    <link rel="stylesheet" href="./theme.css" />
    <link rel="stylesheet" href="./site-shell.css" />
    <link rel="stylesheet" href="./assets/auth.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  </head>
  <body class="page-tm-v2 page-login">
    <div class="tm-wrap">
      <header class="home-nav" aria-label="주요 메뉴">
        <a class="home-nav__logo" href="./index.html" aria-label="TotalMoney AI 홈">
          <div class="home-nav__logo-box" aria-hidden="true">
            <span>TM</span>
            <span>AI</span>
          </div>
          <div>
            <div class="home-nav__brand-name">TotalMoney</div>
            <div class="home-nav__brand-sub">
              <span>powered by</span>
              <span class="home-nav__ai-badge">AI</span>
            </div>
          </div>
        </a>
        <button type="button" class="home-nav__toggle" aria-label="메뉴 열기" aria-expanded="false">
          <i class="ti ti-menu-2" aria-hidden="true"></i>
        </button>
        <nav class="home-nav__menu">
          <a class="home-nav__link home-nav__home-btn" href="./index.html" title="홈"><i class="ti ti-home" aria-hidden="true"></i></a>
          <a class="home-nav__link" href="./briefing.html">브리핑</a>
          <a class="home-nav__link" href="./daily-market.html">마감시황</a>
          <a class="home-nav__link" href="./market.html">시장지표</a>
          <a class="home-nav__link" href="./realtime.html">실시간시세</a>
          <a class="home-nav__link" href="./us-market.html">미국주식</a>
          <a class="home-nav__link" href="./crypto.html">암호화폐</a>
          <a class="home-nav__link" href="./world-market.html">글로벌 랭킹</a>
          <a class="home-nav__link" href="./weekly-market.html">일정</a>
          <a class="home-nav__link" href="./stock-analysis.html">AI 종목분석</a>
          <button type="button" class="home-nav__theme tm-theme-toggle" id="theme-toggle" aria-label="테마 전환" title="테마 전환">
            <i class="ti ti-moon" id="theme-icon" aria-hidden="true"></i>
          </button>
        </nav>
      </header>

      <main class="tm-main tm-auth-main">
        <div class="tm-auth-card">
          <h1 class="tm-auth-card__title">로그인</h1>
          <p class="tm-auth-card__desc">TotalMoney AI 계정으로 로그인하세요.</p>

          <form id="login-form" autocomplete="on">
            <div class="tm-auth-field">
              <label for="login-email">이메일</label>
              <input type="email" id="login-email" name="email" required placeholder="you@example.com" />
            </div>
            <div class="tm-auth-field">
              <label for="login-password">비밀번호</label>
              <input type="password" id="login-password" name="password" required placeholder="비밀번호" />
            </div>
            <button type="submit" class="tm-auth-submit" id="login-submit">로그인</button>
            <div class="tm-auth-msg" id="login-msg"></div>
          </form>

          <p class="tm-auth-switch">아직 계정이 없으신가요? <a href="./signup.html">회원가입</a></p>
        </div>
      </main>
    </div>

    <script>
      (function () {
        function showMsg(text, isError) {
          const el = document.getElementById("login-msg");
          el.textContent = text;
          el.classList.add("is-visible");
          el.classList.toggle("tm-auth-msg--error", !!isError);
          el.classList.toggle("tm-auth-msg--ok", !isError);
        }

        function redirectAfterLogin() {
          const params = new URLSearchParams(window.location.search);
          const next = params.get("next");
          window.location.href = next && next.startsWith("/") ? next : "./mypage.html";
        }

        document.getElementById("login-form").addEventListener("submit", async function (e) {
          e.preventDefault();
          if (window.TMAuth && window.TMAuth.isSetupPending()) {
            showMsg("아직 로그인 기능 설정 중입니다. 잠시 후 다시 시도해주세요.", true);
            return;
          }
          const email = document.getElementById("login-email").value.trim();
          const password = document.getElementById("login-password").value;
          const btn = document.getElementById("login-submit");
          btn.disabled = true;
          btn.textContent = "로그인 중…";
          try {
            await window.TMAuth.signIn({ email, password });
            showMsg("로그인 성공! 이동합니다…", false);
            setTimeout(redirectAfterLogin, 400);
          } catch (err) {
            showMsg((err && err.message) || "로그인에 실패했습니다.", true);
          } finally {
            btn.disabled = false;
            btn.textContent = "로그인";
          }
        });
      })();
    </script>
  </body>
</html>
