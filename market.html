          <button type="button" class="home-nav__theme tm-theme-toggle" id="theme-toggle" aria-label="테마 전환" title="테마 전환">
            <i class="ti ti-moon" id="theme-icon" aria-hidden="true"></i>

      <div class="home-ticker" id="home-ticker" aria-label="실시간 시장 지표" aria-live="polite">
        <span class="home-empty">시장 지표 로딩 중…</span>
      </div>

      <main class="tm-main">
        <div class="page">
          <header class="masthead masthead--title-only">
            <div class="masthead__copy">
              <p class="masthead__kicker">Market Overview</p>
              <h1 class="masthead__title">시장 지표 종합</h1>
            </div>
          </header>
          <p class="market-updated" id="market-updated">데이터 로딩 중…</p>
          <div id="market-error" class="market-error" hidden></div>
          <div id="market-root">
            <p class="market-empty">지표를 불러오는 중…</p>
          </div>
        </div>
      </main>

      <nav class="tm-bottom-nav home-m-bottom-nav" aria-label="모바일 빠른 이동"></nav>
    </div>

    <script>
      (function () {
        const $ = (id) => document.getElementById(id);

        function fmtPct(n) {
          if (n == null || !Number.isFinite(n)) return "—";
          const sign = n > 0 ? "+" : "";
          return `${sign}${n.toFixed(2)}%`;
        }

        function fmtValue(item) {
          if (item.value == null || !Number.isFinite(item.value)) return "—";
          const v = item.value;
          const digits = item.id === "gold" || item.id === "platinum" ? 1 : item.id === "natgas" || item.id === "copper" ? 3 : 2;
          if (item.id === "usdkrw") return v.toLocaleString("ko-KR", { maximumFractionDigits: 2 });
          if (item.unit === "%") return `${v.toFixed(item.id === "btc-dominance" ? 2 : 2)}%`;
          if (item.id === "fear-greed") return String(Math.round(v));
          if (item.currency === "USD") {
            return `$${v.toLocaleString("en-US", { minimumFractionDigits: 0, maximumFractionDigits: digits })}`;
          }
          if (item.currency === "cents") {
            if (v < 50 || v > 3000) console.warn("[market] unusual agri quote", item.id, v);
            return `${v.toLocaleString("en-US", { maximumFractionDigits: digits })}¢`;
          }
          if (v >= 10000) return v.toLocaleString("en-US", { maximumFractionDigits: 2 });
          if (v >= 1000) return v.toLocaleString("en-US", { maximumFractionDigits: 2 });
          return v.toLocaleString("en-US", { maximumFractionDigits: 2 });
        }

        function changeClass(pct) {
          if (pct == null || !Number.isFinite(pct) || Math.abs(pct) < 0.0001) return "market-card__change--flat";
          return pct > 0 ? "market-card__change--up" : "market-card__change--down";
        }

        function sparkTrend(pct) {
          if (pct == null || !Number.isFinite(pct) || Math.abs(pct) < 0.0001) return null;
          return pct > 0;
        }

        function sparklineSvg(points, up, itemId) {
          if (!Array.isArray(points) || points.length < 2) return "";
          const w = 100;
          const h = 40;
          const pad = 4;
          const min = Math.min(...points);
          const max = Math.max(...points);
          const range = max - min || 1;
          const step = w / (points.length - 1);
          let lineD = "";
          points.forEach((p, i) => {
            const x = (i * step).toFixed(1);
            const y = (h - pad - ((p - min) / range) * (h - pad * 2)).toFixed(1);
            lineD += `${i === 0 ? "M" : "L"}${x},${y} `;
          });
          const lastX = ((points.length - 1) * step).toFixed(1);
          const areaD = `${lineD.trim()} L ${lastX},${h} L 0,${h} Z`;
          const trend = up === true ? "market-spark--up" : up === false ? "market-spark--down" : "market-spark--flat";
          const gid = `spark-${String(itemId || "x").replace(/[^a-z0-9_-]/gi, "")}`;
          return `<svg class="market-spark ${trend}" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" aria-hidden="true">
            <defs>
              <linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="${up === true ? "#e24b4a" : up === false ? "#3b82f6" : "currentColor"}" stop-opacity="0.28"/>
                <stop offset="100%" stop-color="${up === true ? "#e24b4a" : up === false ? "#3b82f6" : "currentColor"}" stop-opacity="0"/>
              </linearGradient>
            </defs>
            <path class="market-spark__area" d="${areaD}" fill="url(#${gid})"/>
            <path class="market-spark__line" d="${lineD.trim()}"/>
          </svg>`;
        }

        function changeChipHtml(pct) {
          const cls = changeClass(pct);
          const arrow =
            cls === "market-card__change--up" ? "▲" : cls === "market-card__change--down" ? "▼" : "−";
          return `<span class="market-card__change ${cls}"><span class="market-card__change-arrow" aria-hidden="true">${arrow}</span>${fmtPct(pct)}</span>`;
        }

        function cardHtml(item) {
          const pct = item.changePct;
          const subText = item.rating || item.hint || "";
          const sub = subText ? `<div class="market-card__sub">${subText}</div>` : "";
          const changeHtml =
            item.id === "fear-greed" || item.id === "btc-dominance" ? "" : changeChipHtml(pct);
          const spark = sparklineSvg(item.sparkline, sparkTrend(pct), item.id);
          return `<article class="market-card" data-id="${item.id}">
            <div class="market-card__name">${item.name}</div>
            <div class="market-card__body">
              <div class="market-card__quote">
                <div class="market-card__value">${fmtValue(item)}</div>
                ${changeHtml}
                ${sub}
              </div>
              ${spark}
            </div>
          </article>`;
        }

        function sectionHtml(title, items) {
          if (!items || !items.length) return "";
          return `<section class="market-section">
            <h2 class="market-section__title">${title}</h2>
            <div class="market-grid">${items.map(cardHtml).join("")}</div>
          </section>`;
        }

        function commoditiesSectionHtml(items) {
          if (!items || !items.length) return "";
          const groups = [
            { key: "energy", title: "에너지" },
            { key: "precious", title: "귀금속" },
            { key: "agri", title: "농산물" },
          ];
          const byGroup = items.reduce((acc, item) => {
            const key = item.group || "energy";
            (acc[key] = acc[key] || []).push(item);
            return acc;
          }, {});
          const body = groups
            .filter((g) => byGroup[g.key]?.length)
            .map(
              (g) => `<div class="market-subsection">
              <h3 class="market-subsection__title">${g.title}</h3>
              <div class="market-grid">${byGroup[g.key].map(cardHtml).join("")}</div>
            </div>`
            )
            .join("");
          return `<section class="market-section market-section--commodities">
            <h2 class="market-section__title">원자재</h2>
            ${body}
          </section>`;
        }

        function render(data) {
          const s = data.sections || {};
          const major = [...(s.korea || []), ...(s.us || [])];
          const html = [
            sectionHtml("주요 지수", major),
            sectionHtml("글로벌 지수", s.global),
            sectionHtml("금리 · 환율", s.ratesFx),
            commoditiesSectionHtml(s.commodities),
            sectionHtml("시장 심리", s.sentiment),
          ]
            .filter(Boolean)
            .join("");
          $("market-root").innerHTML = html || '<p class="market-empty">표시할 지표가 없습니다.</p>';
          if (data.updatedAt) {
            const d = new Date(data.updatedAt);
            $("market-updated").textContent = `업데이트: ${d.toLocaleString("ko-KR", { timeZone: "Asia/Seoul" })} (KST)`;
          }
        }

        async function load() {
          try {
            const res = await fetch("/api/market-overview?t=" + Date.now(), { cache: "no-store" });
            if (!res.ok) throw new Error("HTTP " + res.status);
            const data = await res.json();
            if (data.error) throw new Error(data.error);
            $("market-error").hidden = true;
            render(data);
          } catch (e) {
            $("market-error").hidden = false;
            $("market-error").textContent = "시장 지표를 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.";
            $("market-root").innerHTML = '<p class="market-empty">데이터 없음</p>';
            $("market-updated").textContent = "";
          }
        }

        load();
      })();
    </script>
  </body>
</html>
