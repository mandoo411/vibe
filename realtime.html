<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#ffffff" />
    <title>TotalMoney AI · 실시간시세</title>
    <link rel="apple-touch-icon" href="/assets/icon-t-180.png?v=2">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icon-t-32.png?v=2">
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg?v=2">
    <link rel="shortcut icon" href="/favicon.ico?v=2">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+KR:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="./theme.js"></script>
    <link rel="stylesheet" href="./theme.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"
    />

    <link rel="stylesheet" href="./weekly-market.css" />
    <link rel="stylesheet" href="./daily-market.css" />
    <link rel="stylesheet" href="./site-nav.css" />
    <script src="./site-nav.js" defer></script>
    <style>
      /* Bloomberg-style dense board — .page 폭은 weekly-market.css(1100px)와 동일 */
      /* 상단은 .page 패딩; 보드 영역만 */
      .rt-wrap {
        max-width: none;
        margin: 0;
        padding: 0;
      }
      .rt-strip {
        display: flex;
        flex-wrap: wrap;
        align-items: stretch;
        gap: 10px;
        margin-bottom: 14px;
      }
      .rt-index-chip {
        flex: 1 1 200px;
        min-width: 0;
        padding: 10px 12px;
        background: var(--bg-panel);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 6px 12px;
        align-items: baseline;
        font-family: var(--font-mono);
        font-size: 12px;
        letter-spacing: 0.02em;
      }
      .rt-index-chip__name {
        color: var(--text-muted);
        text-transform: uppercase;
        font-size: 10px;
        letter-spacing: 0.12em;
      }
      .rt-index-chip__val {
        font-size: 18px;
        font-weight: 600;
        color: var(--text);
        justify-self: end;
      }
      .rt-meta-bar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px 16px;
        padding: 8px 12px;
        margin-bottom: 14px;
        background: var(--surface-bar);
        border: 1px solid var(--border-strong);
        border-radius: var(--radius);
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-muted);
      }
      .rt-session {
        padding: 3px 8px;
        border-radius: 2px;
        border: 1px solid var(--border);
        color: var(--accent-bright);
        font-weight: 600;
        letter-spacing: 0.06em;
      }
      .rt-session--pre {
        color: var(--status-pre);
      }
      .rt-session--open {
        color: var(--status-open);
      }
      .rt-session--after {
        color: var(--accent-bright);
      }
      .rt-session--closed {
        color: var(--text-dim);
      }
      .rt-session__sub {
        color: var(--text-dim);
        max-width: 56ch;
      }
      .rt-conn {
        margin-left: auto;
        color: var(--text-dim);
      }
      .rt-tabs {
        display: flex;
        flex-wrap: nowrap;
        align-items: stretch;
        gap: 6px;
        padding: 8px;
        border-bottom: 1px solid var(--border);
        background: var(--surface-bar);
      }
      .rt-tab {
        appearance: none;
        flex: 1;
        min-width: 0;
        background: white;
        border: 0.5px solid rgba(200, 210, 255, 0.5);
        border-radius: 20px;
        margin: 0;
        padding: 8px 20px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          color 0.15s ease,
          border-color 0.15s ease,
          box-shadow 0.15s ease;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0;
        line-height: 1.25;
        white-space: nowrap;
        color: #555;
      }
      .rt-tab-search input {
        height: 34px;
        padding: 0 10px;
        border-radius: 3px;
        border: 1px solid var(--border);
        background: var(--bg-panel);
        color: var(--text);
        font-family: var(--font-mono);
        font-size: 11px;
        outline: none;
      }
      .rt-tab-search input::placeholder {
        color: var(--text-dim);
      }
      .rt-tab-search input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.12);
      }
      .rt-tab-search button {
        height: 34px;
        padding: 0 10px;
        border-radius: 3px;
        border: 1px solid var(--border);
        background: var(--bg-tertiary);
        color: var(--accent-bright);
        font-family: var(--font-mono);
        font-size: 11px;
        font-weight: 700;
        cursor: pointer;
      }
      .rt-tab-search button:hover {
        border-color: var(--border-strong);
      }

      .rt-stock-panel {
        margin: 12px 12px 0;
        padding: 14px 14px;
        background: var(--bg-panel);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
      }
      .rt-stock-head {
        display: flex;
        flex-wrap: wrap;
        gap: 10px 12px;
        align-items: baseline;
        justify-content: space-between;
        margin-bottom: 12px;
      }
      .rt-stock-title {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }
      .rt-stock-name {
        font-size: 14px;
        font-weight: 800;
        color: var(--text);
        letter-spacing: -0.02em;
      }
      .rt-stock-code {
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--text-dim);
      }
      .rt-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 20px;
        padding: 0 8px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: var(--bg-tertiary);
        color: var(--accent-bright);
        font-family: var(--font-mono);
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .rt-stock-quote {
        display: flex;
        gap: 10px;
        align-items: baseline;
        font-family: var(--font-mono);
      }
      .rt-stock-price {
        font-size: 20px;
        font-weight: 700;
        color: var(--text);
      }
      .rt-stock-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin-top: 12px;
      }
      .rt-kv {
        padding: 10px 10px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--bg-tertiary);
      }
      .rt-kv__k {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--text-dim);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .rt-kv__v {
        margin-top: 6px;
        font-family: var(--font-mono);
        font-size: 14px;
        font-weight: 700;
        color: var(--text);
      }
      .rt-kv--hi .rt-kv__v,
      .rt-kv--hi52 .rt-kv__v {
        color: #ef5350;
      }
      .rt-kv--lo .rt-kv__v,
      .rt-kv--lo52 .rt-kv__v {
        color: #1565c0;
      }
      [data-theme="dark"] .rt-kv--hi .rt-kv__v,
      [data-theme="dark"] .rt-kv--hi52 .rt-kv__v,
      .dark-mode .rt-kv--hi .rt-kv__v,
      .dark-mode .rt-kv--hi52 .rt-kv__v {
        color: #26a69a;
      }
      [data-theme="dark"] .rt-kv--lo .rt-kv__v,
      [data-theme="dark"] .rt-kv--lo52 .rt-kv__v,
      .dark-mode .rt-kv--lo .rt-kv__v,
      .dark-mode .rt-kv--lo52 .rt-kv__v {
        color: #ef5350;
      }

      .rt-fin-grid {
        margin-top: 12px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .rt-fin-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: baseline;
        padding: 10px 10px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--bg-tertiary);
        font-family: var(--font-mono);
      }
      .rt-fin-k {
        font-size: 10px;
        color: var(--text-dim);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .rt-fin-v {
        font-size: 13px;
        font-weight: 700;
        color: var(--text);
      }
      .rt-stock-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        justify-content: flex-end;
        margin-top: 12px;
      }
      .rt-stock-actions a {
        text-decoration: none;
      }
      .rt-cta {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        border: none;
        border-radius: var(--border-radius-md, 12px);
        padding: 12px 24px;
        font-size: 13px;
        font-weight: 600;
        background: linear-gradient(135deg, #3339bf, #5560e8);
        color: white;
        letter-spacing: -0.01em;
        cursor: pointer;
      }
      .rt-cta:focus-visible {
        outline: 3px solid rgba(85, 96, 232, 0.35);
        outline-offset: 2px;
      }
      .rt-stock-loading {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--text-dim);
        font-family: var(--font-mono);
        font-size: 11px;
      }
      .rt-spinner {
        width: 14px;
        height: 14px;
        border-radius: 999px;
        border: 2px solid rgba(212, 175, 55, 0.25);
        border-top-color: rgba(212, 175, 55, 0.95);
        animation: rtspin 0.9s linear infinite;
      }
      @keyframes rtspin {
        to {
          transform: rotate(360deg);
        }
      }

      .rt-stock-chart {
        margin-top: 12px;
      }
      .rt-stock-chart .rt-chart-wrap {
        margin: 0;
        border-radius: 10px;
      }

      @media (max-width: 860px) {
        .rt-stock-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
        .rt-tab-search {
          flex: 1 1 100%;
          margin-left: 0 !important;
        }
        .rt-tab-search input {
          flex: 1;
          width: auto !important;
          min-width: 0;
        }
      }
      .rt-tab[aria-selected="false"] {
        background: white;
        border: 0.5px solid rgba(200, 210, 255, 0.5);
        color: #555;
      }
      .rt-tab[aria-selected="true"] {
        background: linear-gradient(135deg, #3339bf, #5560e8);
        color: white;
        border: none;
        border-radius: 20px;
        padding: 8px 20px;
        font-size: 13px;
        font-weight: 600;
        box-shadow: 0 10px 22px rgba(51, 57, 191, 0.2);
      }
      .rt-tab[aria-selected="false"]:hover {
        color: #333;
        border-color: rgba(160, 175, 255, 0.9);
      }

      [data-theme="dark"] .rt-tab[aria-selected="false"],
      .dark-mode .rt-tab[aria-selected="false"] {
        background: #1c2030;
        border: 0.5px solid rgba(255, 255, 255, 0.1);
        color: #aaa;
      }
      .rt-panel {
        border: 1px solid var(--accent-highlight);
        border-top: 1px solid var(--accent-dim);
        border-radius: 0 0 var(--radius) var(--radius);
        background: var(--bg-panel);
        box-shadow:
          var(--sheet-shadow),
          inset 0 1px 0 var(--accent-dim);
        overflow: hidden;
      }
      .rt-scroll {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        margin: 0 -2px;
      }
      .rt-panel__head {
        padding: 8px 12px;
        border-bottom: 1px solid var(--border);
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-muted);
        letter-spacing: 0.08em;
      }
      .rt-panel__head-title {
        letter-spacing: inherit;
      }
      .rt-chart-quote-strip {
        padding: 8px 12px;
        border-bottom: 1px solid var(--border);
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-muted);
      }
      .rt-chart-quote-strip--empty {
        display: none;
      }
      .rt-chart-quote-strip__inner {
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        gap: 6px 10px;
      }
      .rt-chart-quote-strip__lbl {
        color: var(--text-dim);
        letter-spacing: 0.06em;
      }
      .rt-chart-quote-strip__val {
        color: var(--text);
        font-weight: 600;
      }
      .rt-chart-quote-strip__sep {
        color: var(--text-dim);
        user-select: none;
      }
      .rt-table {
        width: 100%;
        min-width: 280px;
        border-collapse: collapse;
        font-family: var(--font-mono);
        font-size: 12px;
        table-layout: fixed;
      }
      .rt-table th,
      .rt-table td {
        padding: 6px 8px;
        border-bottom: 1px solid var(--border);
        text-align: left;
        vertical-align: middle;
      }
      .rt-td-rank {
        width: 2.5rem;
        white-space: nowrap;
      }
      .rt-td-name {
        word-break: keep-all;
        overflow-wrap: anywhere;
      }
      .rt-td-price,
      .rt-td-chg,
      .rt-td-vol,
      .rt-td-tv,
      .rt-td-mcap {
        white-space: nowrap;
      }
      .rt-table th {
        position: sticky;
        top: 0;
        z-index: 1;
        background: var(--bg-tertiary);
        color: var(--text-dim);
        font-weight: 600;
        text-transform: uppercase;
        font-size: 10px;
        letter-spacing: 0.1em;
      }
      .rt-table tbody tr:nth-child(even) td {
        background: color-mix(in srgb, var(--bg-tertiary) 45%, transparent);
      }
      .rt-table tr:hover td {
        background: var(--accent-dim);
      }
      .rt-table .num {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      .rt-name {
        font-weight: 600;
        color: var(--text);
        line-height: 1.35;
      }
      .rt-name-link {
        font-weight: 600;
        color: var(--text);
        text-decoration: none;
        line-height: 1.35;
        max-width: 100%;
        overflow-wrap: anywhere;
        word-break: keep-all;
        touch-action: manipulation;
      }
      .rt-name-link:hover,
      .rt-name-link:focus-visible {
        color: var(--accent-bright);
        text-decoration: underline;
        outline: none;
      }
      .rt-name-text {
        font-weight: 600;
        color: var(--text);
        line-height: 1.35;
        overflow-wrap: anywhere;
        word-break: keep-all;
      }
      .rt-code {
        font-size: 10px;
        color: var(--text-dim);
      }
      .rt-mkt {
        display: inline-block;
        margin-left: 6px;
        padding: 1px 5px;
        font-size: 9px;
        letter-spacing: 0.06em;
        border: 1px solid var(--border);
        color: var(--text-muted);
        border-radius: 2px;
        vertical-align: middle;
      }
      .rt-hour {
        font-size: 10px;
        color: var(--accent);
      }
      .rt-mcap-unit {
        margin-left: 4px;
        font-size: 9px;
        color: var(--text-dim);
      }
      .rt-error {
        margin-top: 12px;
        padding: 10px 12px;
        background: var(--down-surface);
        border: 1px solid var(--down-border);
        color: var(--down-text);
        font-size: 13px;
        border-radius: var(--radius);
      }
      .rt-skel-row td {
        padding: 6px 8px;
        border-bottom: 1px solid var(--border);
      }
      .rt-skel-bar {
        display: block;
        height: 10px;
        max-width: 100%;
        border-radius: 2px;
        background: var(--bg-tertiary);
      }
      .rt-name-chart-btn {
        font: inherit;
        font-weight: 600;
        color: var(--text);
        background: none;
        border: 0;
        padding: 0;
        margin: 0;
        cursor: pointer;
        text-align: left;
        max-width: 100%;
        overflow-wrap: anywhere;
        word-break: keep-all;
        touch-action: manipulation;
      }
      .rt-name-chart-btn:hover,
      .rt-name-chart-btn:focus-visible {
        color: var(--accent-bright);
        text-decoration: underline;
        outline: none;
      }
      .rt-chart-row td {
        padding: 0 !important;
        border-bottom: 1px solid var(--border-strong);
        background: var(--surface-inset);
        vertical-align: top;
      }
      .rt-chart-wrap {
        width: 100%;
        min-height: 428px;
        position: relative;
        border-top: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        background: var(--surface-inset);
      }
      .rt-chart-body {
        position: relative;
        flex: 1 1 auto;
        min-height: 360px;
      }
      .rt-chart-loading-msg {
        position: absolute;
        inset: 0;
        z-index: 2;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        color: var(--text-muted);
        background: color-mix(in srgb, var(--bg-primary), 0.55);
        pointer-events: none;
      }
      .rt-chart-loading-msg[hidden] {
        display: none !important;
      }
      .rt-chart-panes.rt-chart-panes--pending {
        visibility: hidden;
      }
      .rt-chart-toolbar {
        flex: 0 0 auto;
        display: flex;
        flex-wrap: wrap;
        align-items: stretch;
        justify-content: flex-start;
        gap: 6px;
        padding: 8px 8px 10px;
        border-bottom: 1px solid var(--border);
        background: var(--surface-bar);
        font-family: var(--font-mono);
        font-size: 11px;
      }
      .rt-chart-interval-btn {
        appearance: none;
        margin: 0;
        flex: 1 1 auto;
        min-width: 3.25rem;
        padding: 8px 6px;
        border-radius: 3px;
        border: 1px solid var(--border);
        background: var(--bg-tertiary);
        color: var(--text-muted);
        font-family: var(--font-mono);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.02em;
        cursor: pointer;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }
      .rt-chart-interval-btn:hover,
      .rt-chart-interval-btn:focus-visible {
        color: var(--text);
        border-color: var(--sheet-accent-border);
        outline: none;
      }
      .rt-chart-interval-btn[aria-pressed="true"] {
        color: var(--accent-bright);
        border-color: var(--sheet-accent-border-strong);
        background: var(--sheet-accent-soft);
        box-shadow: inset 0 0 0 1px var(--sheet-accent-soft);
      }
      .rt-chart-panes {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 360px;
        min-height: 360px;
        flex: 1 1 auto;
        position: relative;
      }
      .rt-chart-pane--candle {
        position: relative;
        flex: 65;
        min-height: 0;
      }
      .rt-chart-pane-sep {
        flex: 0 0 1px;
        background: var(--sheet-accent-border);
        box-shadow: 0 1px 0 var(--border);
      }
      .rt-chart-pane--vol {
        position: relative;
        flex: 35;
        min-height: 0;
      }
      .rt-lw-candle-host,
      .rt-lw-volume-host {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      .rt-lw-chart-err {
        margin: 0;
        padding: 12px 14px;
        font-size: 13px;
        color: var(--down-text);
      }
      .rt-lw-ohlc-tooltip {
        position: absolute;
        z-index: 50;
        left: 0;
        top: 0;
        display: none;
        min-width: 158px;
        max-width: min(280px, 92vw);
        padding: 9px 11px;
        pointer-events: none;
        background: rgba(14, 12, 10, 0.96);
        border: 1px solid rgba(148, 130, 98, 0.45);
        border-radius: var(--radius);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.55);
        font-family: var(--font-mono);
        font-size: 11px;
        line-height: 1.45;
        color: var(--text);
      }
      .rt-lw-ohlc-tooltip__dt {
        margin: 0 0 7px;
        padding-bottom: 6px;
        border-bottom: 1px solid var(--border);
        font-weight: 600;
        color: var(--accent-bright);
        letter-spacing: 0.02em;
      }
      .rt-lw-ohlc-tooltip__row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin: 2px 0;
      }
      .rt-lw-ohlc-tooltip__row span:first-child {
        color: var(--text-muted);
        flex-shrink: 0;
      }
      .rt-lw-ohlc-tooltip__row span:last-child {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      @media (max-width: 520px) {
        .rt-wrap {
          width: 100%;
          max-width: 100%;
          padding-left: 0;
          padding-right: 0;
        }
        .rt-table {
          font-size: 11px;
        }
        .rt-table th,
        .rt-table td {
          padding: 5px 4px;
        }
        .rt-td-rank {
          width: 2rem;
        }
        .rt-tab {
          padding: 8px 10px;
          font-size: 10px;
          letter-spacing: 0.06em;
        }
        .rt-index-chip {
          font-size: 11px;
          padding: 8px 10px;
        }
        .rt-index-chip__val {
          font-size: 15px;
        }
        .rt-chart-toolbar {
          gap: 5px;
          padding: 6px 6px 8px;
        }
        .rt-chart-interval-btn {
          min-width: 2.75rem;
          padding: 9px 4px;
          font-size: 10px;
        }
      }

      /* 초기 로딩 — 다크 배경 + 골드 포인트 */
      .rt-loading {
        position: fixed;
        inset: 0;
        z-index: 2000;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: max(24px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right))
          max(24px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
        background:
          radial-gradient(ellipse 90% 60% at 50% 32%, var(--accent-dim) 0%, transparent 58%),
          radial-gradient(ellipse 100% 45% at 50% 100%, var(--sheet-accent-soft) 0%, transparent 50%),
          var(--bg-primary);
        transition: opacity 0.35s ease, visibility 0.35s ease;
      }
      .rt-loading::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0.55;
        background-image:
          radial-gradient(circle at 10% 14%, var(--accent-highlight) 0, var(--accent-dim) 1.5px),
          radial-gradient(circle at 22% 78%, var(--accent-highlight) 0, var(--accent-dim) 1px),
          radial-gradient(circle at 88% 18%, var(--accent-highlight) 0, var(--accent-dim) 1.5px),
          radial-gradient(circle at 92% 62%, var(--accent-highlight) 0, var(--accent-dim) 1px),
          radial-gradient(circle at 6% 48%, var(--accent-highlight) 0, var(--accent-dim) 1px),
          radial-gradient(circle at 48% 8%, var(--accent-highlight) 0, var(--accent-dim) 1px),
          radial-gradient(circle at 72% 88%, var(--accent-highlight) 0, var(--accent-dim) 1px),
          radial-gradient(circle at 38% 92%, var(--accent-highlight) 0, var(--accent-dim) 1px);
      }
      .rt-loading[hidden] {
        display: none;
        pointer-events: none;
      }
      .rt-loading__inner {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 1.75rem;
        max-width: 28rem;
      }
      .rt-loading__brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.35rem;
      }
      .rt-loading__logo {
        margin: 0;
        font-family: "Cormorant Garamond", Georgia, "Times New Roman", serif;
        font-size: clamp(2.125rem, 7vw, 3.35rem);
        font-weight: 600;
        letter-spacing: 0.03em;
        line-height: 1.1;
        background: linear-gradient(180deg, var(--accent-bright) 0%, var(--accent) 42%, var(--accent-secondary) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow: none;
        filter: drop-shadow(0 2px 24px var(--accent-highlight));
      }
      .rt-loading__logo-ai {
        font-style: italic;
        font-weight: 500;
        letter-spacing: 0.06em;
      }
      .rt-loading__tagline {
        margin: 0;
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: clamp(9px, 2.1vw, 11px);
        font-weight: 500;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: rgba(196, 184, 168, 0.72);
      }
      .rt-loading__spinner {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: 3px solid var(--accent-highlight);
        border-top-color: var(--accent);
        border-right-color: var(--accent-ring);
        box-shadow: 0 0 20px var(--accent-dim);
        animation: rt-spin 0.8s linear infinite;
      }
      .rt-loading__text {
        margin: 0;
        font-family: var(--font-sans, "Noto Sans KR", sans-serif);
        font-size: clamp(14px, 3.5vw, 16px);
        font-weight: 500;
        letter-spacing: 0.02em;
        color: rgba(200, 190, 175, 0.88);
      }
      @keyframes rt-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
