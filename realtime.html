<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0d0b08" />
    <title>TotalMoney AI · 실시간 전광판</title>
    <link rel="icon" type="image/png" href="./assets/totalmoney_ai.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+KR:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./weekly-market.css" />
    <link rel="stylesheet" href="./daily-market.css" />
    <link rel="stylesheet" href="./site-nav.css" />
    <style>
      /* Bloomberg-style dense board — .page 폭은 weekly-market.css(1100px)와 동일 */
      /* 상단은 .page 패딩; 보드 영역만 */
      .rt-wrap {
        max-width: none;
        margin: 0;
        padding: 0;
      }
      .rt-strip {
        display: flex;
        flex-wrap: wrap;
        align-items: stretch;
        gap: 10px;
        margin-bottom: 14px;
      }
      .rt-index-chip {
        flex: 1 1 200px;
        min-width: 0;
        padding: 10px 12px;
        background: var(--bg-panel);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 6px 12px;
        align-items: baseline;
        font-family: var(--font-mono);
        font-size: 12px;
        letter-spacing: 0.02em;
      }
      .rt-index-chip__name {
        color: var(--text-muted);
        text-transform: uppercase;
        font-size: 10px;
        letter-spacing: 0.12em;
      }
      .rt-index-chip__val {
        font-size: 18px;
        font-weight: 600;
        color: var(--text);
        justify-self: end;
      }
      .rt-meta-bar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px 16px;
        padding: 8px 12px;
        margin-bottom: 14px;
        background: #0a0907;
        border: 1px solid var(--border-strong);
        border-radius: var(--radius);
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-muted);
      }
      .rt-session {
        padding: 3px 8px;
        border-radius: 2px;
        border: 1px solid var(--border);
        color: var(--accent-bright);
        font-weight: 600;
        letter-spacing: 0.06em;
      }
      .rt-session--pre {
        color: #9ecbff;
      }
      .rt-session--open {
        color: #7cffb3;
      }
      .rt-session--after {
        color: #f0c75a;
      }
      .rt-session--closed {
        color: var(--text-dim);
      }
      .rt-session__sub {
        color: var(--text-dim);
        max-width: 56ch;
      }
      .rt-conn {
        margin-left: auto;
        color: var(--text-dim);
      }
      .rt-tabs-outer {
        display: flex;
        justify-content: center;
        width: 100%;
        margin: 0 0 0;
        padding: 0 0 2px;
      }
      .rt-tabs {
        display: flex;
        flex-wrap: wrap;
        align-items: stretch;
        justify-content: center;
        gap: 0;
        max-width: 100%;
        border: 1px solid rgba(212, 175, 55, 0.28);
        border-bottom: none;
        border-radius: 4px 4px 0 0;
        background: linear-gradient(180deg, #12100d 0%, #0b0907 100%);
        box-shadow: inset 0 1px 0 rgba(212, 175, 55, 0.06);
      }
      .rt-tab-sep {
        width: 1px;
        align-self: stretch;
        min-height: 48px;
        background: rgba(212, 175, 55, 0.45);
        flex-shrink: 0;
      }
      .rt-tab {
        appearance: none;
        border: 0;
        margin: 0;
        padding: 12px 40px 10px;
        cursor: pointer;
        background: transparent;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        min-width: 0;
        border-bottom: 2px solid transparent;
        transition:
          color 0.15s ease,
          border-color 0.15s ease;
      }
      .rt-tab__label {
        font-family: var(--font-mono);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        line-height: 1.2;
      }
      .rt-tab__desc {
        font-family: var(--font-sans, "Noto Sans KR", sans-serif);
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.02em;
        line-height: 1.35;
        text-align: center;
        max-width: 22ch;
      }
      .rt-tab[aria-selected="false"] .rt-tab__label,
      .rt-tab[aria-selected="false"] .rt-tab__desc {
        color: rgba(148, 138, 124, 0.88);
      }
      .rt-tab[aria-selected="true"] .rt-tab__label,
      .rt-tab[aria-selected="true"] .rt-tab__desc {
        color: #d4af37;
      }
      .rt-tab[aria-selected="true"] {
        border-bottom-color: #d4af37;
        background: rgba(212, 175, 55, 0.06);
      }
      .rt-tab[aria-selected="false"]:hover .rt-tab__label,
      .rt-tab[aria-selected="false"]:hover .rt-tab__desc {
        color: #d4af37;
      }
      .rt-panel {
        border: 1px solid rgba(212, 175, 55, 0.28);
        border-top: 1px solid rgba(212, 175, 55, 0.18);
        border-radius: 0 0 var(--radius) var(--radius);
        background: var(--bg-panel);
        box-shadow:
          var(--sheet-shadow),
          inset 0 1px 0 rgba(212, 175, 55, 0.04);
        overflow: hidden;
      }
      .rt-scroll {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        margin: 0 -2px;
      }
      .rt-panel__head {
        padding: 8px 12px;
        border-bottom: 1px solid var(--border);
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-muted);
        letter-spacing: 0.08em;
      }
      .rt-panel__head-title {
        letter-spacing: inherit;
      }
      .rt-chart-quote-strip {
        padding: 8px 12px;
        border-bottom: 1px solid var(--border);
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-muted);
      }
      .rt-chart-quote-strip--empty {
        display: none;
      }
      .rt-chart-quote-strip__inner {
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        gap: 6px 10px;
      }
      .rt-chart-quote-strip__lbl {
        color: var(--text-dim);
        letter-spacing: 0.06em;
      }
      .rt-chart-quote-strip__val {
        color: var(--text);
        font-weight: 600;
      }
      .rt-chart-quote-strip__sep {
        color: var(--text-dim);
        user-select: none;
      }
      .rt-table {
        width: 100%;
        min-width: 280px;
        border-collapse: collapse;
        font-family: var(--font-mono);
        font-size: 12px;
        table-layout: fixed;
      }
      .rt-table th,
      .rt-table td {
        padding: 6px 8px;
        border-bottom: 1px solid var(--border);
        text-align: left;
        vertical-align: middle;
      }
      .rt-td-rank {
        width: 2.5rem;
        white-space: nowrap;
      }
      .rt-td-name {
        word-break: keep-all;
        overflow-wrap: anywhere;
      }
      .rt-td-price,
      .rt-td-chg,
      .rt-td-vol,
      .rt-td-tv,
      .rt-td-mcap {
        white-space: nowrap;
      }
      .rt-table th {
        position: sticky;
        top: 0;
        z-index: 1;
        background: #12100c;
        color: var(--text-dim);
        font-weight: 600;
        text-transform: uppercase;
        font-size: 10px;
        letter-spacing: 0.1em;
      }
      .rt-table tr:hover td {
        background: rgba(212, 175, 55, 0.04);
      }
      .rt-table .num {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      .rt-name {
        font-weight: 600;
        color: var(--text);
        line-height: 1.35;
      }
      .rt-name-link {
        font-weight: 600;
        color: var(--text);
        text-decoration: none;
        line-height: 1.35;
        max-width: 100%;
        overflow-wrap: anywhere;
        word-break: keep-all;
        touch-action: manipulation;
      }
      .rt-name-link:hover,
      .rt-name-link:focus-visible {
        color: var(--accent-bright);
        text-decoration: underline;
        outline: none;
      }
      .rt-name-text {
        font-weight: 600;
        color: var(--text);
        line-height: 1.35;
        overflow-wrap: anywhere;
        word-break: keep-all;
      }
      .rt-code {
        font-size: 10px;
        color: var(--text-dim);
      }
      .rt-mkt {
        display: inline-block;
        margin-left: 6px;
        padding: 1px 5px;
        font-size: 9px;
        letter-spacing: 0.06em;
        border: 1px solid var(--border);
        color: var(--text-muted);
        border-radius: 2px;
        vertical-align: middle;
      }
      .rt-hour {
        font-size: 10px;
        color: var(--accent);
      }
      .rt-mcap-unit {
        margin-left: 4px;
        font-size: 9px;
        color: var(--text-dim);
      }
      .rt-error {
        margin-top: 12px;
        padding: 10px 12px;
        background: rgba(248, 112, 112, 0.08);
        border: 1px solid rgba(248, 112, 112, 0.35);
        color: #f8a8a8;
        font-size: 13px;
        border-radius: var(--radius);
      }
      .rt-skel-row td {
        padding: 6px 8px;
        border-bottom: 1px solid var(--border);
      }
      .rt-skel-bar {
        display: block;
        height: 10px;
        max-width: 100%;
        border-radius: 2px;
        background: #2a2418;
      }
      .rt-name-chart-btn {
        font: inherit;
        font-weight: 600;
        color: var(--text);
        background: none;
        border: 0;
        padding: 0;
        margin: 0;
        cursor: pointer;
        text-align: left;
        max-width: 100%;
        overflow-wrap: anywhere;
        word-break: keep-all;
        touch-action: manipulation;
      }
      .rt-name-chart-btn:hover,
      .rt-name-chart-btn:focus-visible {
        color: var(--accent-bright);
        text-decoration: underline;
        outline: none;
      }
      .rt-chart-row td {
        padding: 0 !important;
        border-bottom: 1px solid var(--border-strong);
        background: #0c0a08;
        vertical-align: top;
      }
      .rt-chart-wrap {
        width: 100%;
        min-height: 428px;
        position: relative;
        border-top: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        background: #0c0a08;
      }
      .rt-chart-body {
        position: relative;
        flex: 1 1 auto;
        min-height: 360px;
      }
      .rt-chart-loading-msg {
        position: absolute;
        inset: 0;
        z-index: 2;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        color: var(--text-muted);
        background: rgba(12, 10, 8, 0.55);
        pointer-events: none;
      }
      .rt-chart-loading-msg[hidden] {
        display: none !important;
      }
      .rt-chart-panes.rt-chart-panes--pending {
        visibility: hidden;
      }
      .rt-chart-toolbar {
        flex: 0 0 auto;
        display: flex;
        flex-wrap: wrap;
        align-items: stretch;
        justify-content: flex-start;
        gap: 6px;
        padding: 8px 8px 10px;
        border-bottom: 1px solid var(--border);
        background: #0a0907;
        font-family: var(--font-mono);
        font-size: 11px;
      }
      .rt-chart-interval-btn {
        appearance: none;
        margin: 0;
        flex: 1 1 auto;
        min-width: 3.25rem;
        padding: 8px 6px;
        border-radius: 3px;
        border: 1px solid var(--border);
        background: #12100c;
        color: var(--text-muted);
        font-family: var(--font-mono);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.02em;
        cursor: pointer;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }
      .rt-chart-interval-btn:hover,
      .rt-chart-interval-btn:focus-visible {
        color: var(--text);
        border-color: rgba(201, 162, 39, 0.45);
        outline: none;
      }
      .rt-chart-interval-btn[aria-pressed="true"] {
        color: var(--accent-bright);
        border-color: rgba(201, 162, 39, 0.55);
        background: rgba(201, 162, 39, 0.1);
        box-shadow: inset 0 0 0 1px rgba(201, 162, 39, 0.12);
      }
      .rt-chart-panes {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 360px;
        min-height: 360px;
        flex: 1 1 auto;
        position: relative;
      }
      .rt-chart-pane--candle {
        position: relative;
        flex: 65;
        min-height: 0;
      }
      .rt-chart-pane-sep {
        flex: 0 0 1px;
        background: rgba(201, 162, 39, 0.45);
        box-shadow: 0 1px 0 rgba(0, 0, 0, 0.35);
      }
      .rt-chart-pane--vol {
        position: relative;
        flex: 35;
        min-height: 0;
      }
      .rt-lw-candle-host,
      .rt-lw-volume-host {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      .rt-lw-chart-err {
        margin: 0;
        padding: 12px 14px;
        font-size: 13px;
        color: #f8a8a8;
      }
      .rt-lw-ohlc-tooltip {
        position: absolute;
        z-index: 50;
        left: 0;
        top: 0;
        display: none;
        min-width: 158px;
        max-width: min(280px, 92vw);
        padding: 9px 11px;
        pointer-events: none;
        background: rgba(14, 12, 10, 0.96);
        border: 1px solid rgba(148, 130, 98, 0.45);
        border-radius: var(--radius);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.55);
        font-family: var(--font-mono);
        font-size: 11px;
        line-height: 1.45;
        color: var(--text);
      }
      .rt-lw-ohlc-tooltip__dt {
        margin: 0 0 7px;
        padding-bottom: 6px;
        border-bottom: 1px solid var(--border);
        font-weight: 600;
        color: var(--accent-bright);
        letter-spacing: 0.02em;
      }
      .rt-lw-ohlc-tooltip__row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin: 2px 0;
      }
      .rt-lw-ohlc-tooltip__row span:first-child {
        color: var(--text-muted);
        flex-shrink: 0;
      }
      .rt-lw-ohlc-tooltip__row span:last-child {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      @media (max-width: 520px) {
        .rt-wrap {
          padding-left: 12px;
          padding-right: 12px;
        }
        .rt-table {
          font-size: 11px;
        }
        .rt-table th,
        .rt-table td {
          padding: 5px 4px;
        }
        .rt-td-rank {
          width: 2rem;
        }
        .rt-tab {
          padding: 8px 10px;
          font-size: 10px;
          letter-spacing: 0.06em;
        }
        .rt-index-chip {
          font-size: 11px;
          padding: 8px 10px;
        }
        .rt-index-chip__val {
          font-size: 15px;
        }
        .rt-chart-toolbar {
          gap: 5px;
          padding: 6px 6px 8px;
        }
        .rt-chart-interval-btn {
          min-width: 2.75rem;
          padding: 9px 4px;
          font-size: 10px;
        }
      }

      /* 초기 로딩 — 다크 배경 + 골드 포인트 */
      .rt-loading {
        position: fixed;
        inset: 0;
        z-index: 2000;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: max(24px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right))
          max(24px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
        background:
          radial-gradient(ellipse 90% 60% at 50% 32%, rgba(212, 175, 55, 0.11) 0%, transparent 58%),
          radial-gradient(ellipse 100% 45% at 50% 100%, rgba(201, 162, 39, 0.08) 0%, transparent 50%),
          #0a0907;
        transition: opacity 0.35s ease, visibility 0.35s ease;
      }
      .rt-loading::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0.55;
        background-image:
          radial-gradient(circle at 10% 14%, rgba(212, 175, 55, 0.45) 0, rgba(212, 175, 55, 0) 1.5px),
          radial-gradient(circle at 22% 78%, rgba(212, 175, 55, 0.35) 0, rgba(212, 175, 55, 0) 1px),
          radial-gradient(circle at 88% 18%, rgba(212, 175, 55, 0.4) 0, rgba(212, 175, 55, 0) 1.5px),
          radial-gradient(circle at 92% 62%, rgba(212, 175, 55, 0.3) 0, rgba(212, 175, 55, 0) 1px),
          radial-gradient(circle at 6% 48%, rgba(212, 175, 55, 0.25) 0, rgba(212, 175, 55, 0) 1px),
          radial-gradient(circle at 48% 8%, rgba(212, 175, 55, 0.28) 0, rgba(212, 175, 55, 0) 1px),
          radial-gradient(circle at 72% 88%, rgba(212, 175, 55, 0.32) 0, rgba(212, 175, 55, 0) 1px),
          radial-gradient(circle at 38% 92%, rgba(212, 175, 55, 0.22) 0, rgba(212, 175, 55, 0) 1px);
      }
      .rt-loading[hidden] {
        display: none;
        pointer-events: none;
      }
      .rt-loading__inner {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 1.75rem;
        max-width: 28rem;
      }
      .rt-loading__brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.35rem;
      }
      .rt-loading__logo {
        margin: 0;
        font-family: "Cormorant Garamond", Georgia, "Times New Roman", serif;
        font-size: clamp(2.125rem, 7vw, 3.35rem);
        font-weight: 600;
        letter-spacing: 0.03em;
        line-height: 1.1;
        background: linear-gradient(180deg, #f0d78c 0%, #d4af37 42%, #a67c1a 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow: none;
        filter: drop-shadow(0 2px 24px rgba(212, 175, 55, 0.35));
      }
      .rt-loading__logo-ai {
        font-style: italic;
        font-weight: 500;
        letter-spacing: 0.06em;
      }
      .rt-loading__tagline {
        margin: 0;
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: clamp(9px, 2.1vw, 11px);
        font-weight: 500;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: rgba(196, 184, 168, 0.72);
      }
      .rt-loading__spinner {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: 3px solid rgba(212, 175, 55, 0.22);
        border-top-color: #d4af37;
        border-right-color: rgba(212, 175, 55, 0.55);
        box-shadow: 0 0 20px rgba(212, 175, 55, 0.15);
        animation: rt-spin 0.8s linear infinite;
      }
      .rt-loading__text {
        margin: 0;
        font-family: var(--font-sans, "Noto Sans KR", sans-serif);
        font-size: clamp(14px, 3.5vw, 16px);
        font-weight: 500;
        letter-spacing: 0.02em;
        color: rgba(200, 190, 175, 0.88);
      }
      @keyframes rt-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="rt-loading" class="rt-loading" aria-busy="true" aria-label="데이터 로딩 중">
      <div class="rt-loading__inner">
        <div class="rt-loading__brand">
          <p class="rt-loading__logo">TotalMoney <span class="rt-loading__logo-ai">AI</span></p>
          <p class="rt-loading__tagline">Smarter financial decisions</p>
        </div>
        <div class="rt-loading__spinner" aria-hidden="true"></div>
        <p class="rt-loading__text">시장 데이터를 불러오는 중...</p>
      </div>
    </div>
    <div class="page page--realtime">
      <header class="tm-site-header">
        <div class="header-top">
          <a class="header-top__link" href="./index.html" aria-label="TotalMoney AI 홈">
            <img
              class="header-top__logo"
              src="./assets/totalmoney_ai.png"
              alt=""
              width="36"
              height="36"
              decoding="async"
            />
            <span class="header-top__title">TotalMoney AI</span>
            <span class="header-top__tagline">Smarter Financial Decisions</span>
          </a>
        </div>

        <nav class="tm-site-nav" aria-label="주요 메뉴">
          <a class="tm-site-nav__link" href="./index.html">홈</a>
          <a class="tm-site-nav__link" href="./daily-market.html">시황</a>
          <a class="tm-site-nav__link" href="./briefing.html">장전 브리핑</a>
          <a class="tm-site-nav__link" href="./realtime.html" aria-current="page">전광판</a>
          <a class="tm-site-nav__link" href="./weekly-market.html">주간일정</a>
        </nav>
      </header>

      <div class="rt-wrap">
        <header class="masthead masthead--title-only">
          <div class="masthead__copy">
            <p class="masthead__kicker">Realtime board</p>
            <h1 class="masthead__title">실시간 전광판</h1>
          </div>
        </header>
        <div class="page-hero-sub">
          <div class="masthead__meta">
            <span>한국투자증권 Open API · KRX</span>
            <span><a href="./daily-market.html">장마감 리포트 →</a></span>
          </div>
        </div>
