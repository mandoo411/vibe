<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0d0b08" />
    <title>TotalMoney AI · 서비스 점검 중</title>
    <link rel="icon" type="image/png" href="./assets/totalmoney_ai.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+KR:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./weekly-market.css" />
    <link rel="stylesheet" href="./daily-market.css" />
    <style>
      .rt-maint-wrap {
        max-width: 720px;
        margin: 0 auto;
        padding: 28px 18px 64px;
        padding-left: max(18px, env(safe-area-inset-left));
        padding-right: max(18px, env(safe-area-inset-right));
      }
      .rt-maint-panel {
        margin-top: 28px;
        padding: 36px 28px;
        text-align: center;
        background: var(--bg-panel);
        border: 1px solid var(--border-strong);
        border-radius: var(--radius);
        box-shadow: var(--sheet-shadow);
      }
      .rt-maint-panel h2 {
        margin: 0 0 12px;
        font-family: var(--font-sans, "Noto Sans KR", sans-serif);
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--text);
        letter-spacing: -0.02em;
      }
      .rt-maint-panel p {
        margin: 0;
        font-family: var(--font-sans, "Noto Sans KR", sans-serif);
        font-size: 15px;
        line-height: 1.6;
        color: var(--text-muted);
      }
      .rt-maint-actions {
        margin-top: 24px;
      }
      .rt-maint-actions a {
        font-family: var(--font-mono);
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.06em;
        color: var(--accent-bright);
        text-decoration: none;
      }
      .rt-maint-actions a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="rt-maint-wrap page">
      <header class="masthead">
        <a class="masthead__brand" href="./daily-market.html" aria-label="TotalMoney AI 홈">
          <img
            class="masthead__logo"
            src="./assets/totalmoney_ai.png"
            alt=""
            width="40"
            height="40"
            decoding="async"
          />
          <span class="masthead__brand-text">
            <span class="masthead__brand-name">TotalMoney AI</span>
            <span class="masthead__brand-tagline">Smarter Financial Decisions</span>
          </span>
        </a>
        <div class="masthead__copy">
          <p class="masthead__kicker">Realtime board</p>
          <h1 class="masthead__title">실시간 전광판</h1>
        </div>
      </header>

      <main class="rt-maint-panel" aria-labelledby="maint-heading">
        <h2 id="maint-heading">서비스 점검 중입니다</h2>
        <p>더 나은 서비스를 위해 시스템을 점검하고 있습니다. 잠시 후 다시 이용해 주세요.</p>
        <p class="rt-maint-actions">
          <a href="./daily-market.html">매일 시황으로 이동 →</a>
        </p>
      </main>
    </div>
  </body>
</html>
