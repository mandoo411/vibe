      <main class="tm-main tm-auth-main">
        <div class="tm-auth-card">
          <h1 class="tm-auth-card__title">회원가입</h1>
          <p class="tm-auth-card__desc">이메일로 가입하고 무료 플랜부터 시작하세요.</p>

          <form id="signup-form" autocomplete="on">
            <div class="tm-auth-field">
              <label for="signup-name">이름 / 닉네임</label>
              <input type="text" id="signup-name" name="name" placeholder="닉네임" />
            </div>
            <div class="tm-auth-field">
              <label for="signup-email">이메일</label>
              <input type="email" id="signup-email" name="email" required placeholder="you@example.com" />
            </div>
            <div class="tm-auth-field">
              <label for="signup-password">비밀번호</label>
              <input type="password" id="signup-password" name="password" required minlength="6" placeholder="6자 이상" />
            </div>
            <button type="submit" class="tm-auth-submit" id="signup-submit">회원가입</button>
            <div class="tm-auth-msg" id="signup-msg"></div>
          </form>

          <p class="tm-auth-switch">이미 계정이 있으신가요? <a href="./login.html">로그인</a></p>
        </div>

    <script>
      (function () {
        function showMsg(text, isError) {
          const el = document.getElementById("signup-msg");
          el.textContent = text;
          el.classList.add("is-visible");
          el.classList.toggle("tm-auth-msg--error", !!isError);
          el.classList.toggle("tm-auth-msg--ok", !isError);
        }

        document.getElementById("signup-form").addEventListener("submit", async function (e) {
          e.preventDefault();
          if (window.TMAuth && window.TMAuth.isSetupPending()) {
            showMsg("아직 회원가입 기능 설정 중입니다. 잠시 후 다시 시도해주세요.", true);
            return;
          }
          const displayName = document.getElementById("signup-name").value.trim();
          const email = document.getElementById("signup-email").value.trim();
          const password = document.getElementById("signup-password").value;
          const btn = document.getElementById("signup-submit");
          btn.disabled = true;
          btn.textContent = "가입 처리 중…";
          try {
            await window.TMAuth.signUp({ email, password, displayName });
            showMsg("가입 신청 완료! 이메일함에서 인증 링크를 확인해주세요.", false);
            document.getElementById("signup-form").reset();
          } catch (err) {
            showMsg((err && err.message) || "회원가입에 실패했습니다.", true);
          } finally {
            btn.disabled = false;
            btn.textContent = "회원가입";
          }
        });
      })();
    </script>
