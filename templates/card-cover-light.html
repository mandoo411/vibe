<!DOCTYPE html>
<!--
  슬라이드 1 — 커버
  치환 변수: {{DATE}} {{SLOT_LABEL}} {{COVER_TITLE_LINE1}} {{COVER_TITLE_LINE2}}
  {{HERO_LABEL}} {{HERO_DIR}}(up|down|flat) {{HERO_ARROW}} {{HERO_PCT}} {{HEADLINE}}
-->
<html lang="ko">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="./_shared-light.css" />
<style>
  .cover-wrap {
    position: absolute;
    top: 210px;
    left: 64px;
    right: 64px;
    bottom: 120px;
    display: flex;
    flex-direction: column;
  }
  .cover-date {
    margin-bottom: 26px;
  }
  .cover-title {
    font-size: 72px;
    font-weight: 800;
    line-height: 1.22;
    letter-spacing: -1px;
    margin-bottom: 44px;
  }
  .hero-stat-card {
    position: relative;
    display: flex;
    align-items: baseline;
    gap: 22px;
    padding: 32px 36px;
    margin-bottom: 40px;
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .hero-stat-card.up { background: linear-gradient(135deg, rgba(226,75,74,0.10) 0%, rgba(226,75,74,0.02) 100%); }
  .hero-stat-card.down { background: linear-gradient(135deg, rgba(59,130,246,0.10) 0%, rgba(59,130,246,0.02) 100%); }
  .hero-stat-card.flat { background: rgba(120,120,120,0.06); }
  .hero-stat-card .label {
    font-size: 36px;
    font-weight: 700;
    color: var(--text-secondary);
  }
  .hero-stat-card .value {
    font-size: 82px;
    font-weight: 800;
    letter-spacing: -1px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .hero-stat-card .value svg { width: 56px; height: 56px; }
  .hero-trend {
    position: absolute;
    right: 28px;
    bottom: 16px;
    opacity: 0.7;
    width: 160px;
    height: 64px;
  }
  .hero-trend svg {
    width: 100%;
    height: 100%;
    display: block;
  }
  .cover-headline {
    position: relative;
    font-size: 42px;
    font-weight: 600;
    color: var(--text-primary);
    background: rgba(255,255,255,0.04);
    border-left: 6px solid var(--accent-gold);
    padding: 30px 36px;
    border-radius: 0 16px 16px 0;
    line-height: 1.5;
  }
  .cover-illustration {
    flex: 1;
    min-height: 60px;
    margin-top: 28px;
    opacity: 0.5;
  }
  .cover-illustration svg {
    width: 100%;
    height: 100%;
    display: block;
  }
</style>
</head>
<body>
  <div class="brand-lockup">
    <div class="logo-box"><span>TM</span><span>AI</span></div>
    <div>
      <div class="brand-name">TotalMoney</div>
      <div class="brand-sub">powered by <span class="ai-badge">AI</span></div>
    </div>
  </div>

  <div class="deco-ring tr"></div>
  <div class="deco-ring br"></div>

  <div class="cover-wrap">
    <div class="cover-date">
      <span class="slot-badge"><span class="dot"></span>{{DATE}} {{SLOT_LABEL}}</span>
    </div>
    <div class="cover-title">{{COVER_TITLE_LINE1}}<br/>{{COVER_TITLE_LINE2}}</div>
    <div class="hero-stat-card {{HERO_DIR}}">
      <span class="label">{{HERO_LABEL}}</span>
      <span class="value {{HERO_DIR}}">{{HERO_ARROW}} {{HERO_PCT}}%</span>
      <div class="hero-trend">{{HERO_TREND_SVG}}</div>
    </div>
    <div class="cover-headline">"{{HEADLINE}}"</div>
    <div class="cover-illustration">
      <svg viewBox="0 0 400 140" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,55 C50,15 90,70 140,35 C190,0 230,60 280,25 C320,0 360,40 400,10 L400,140 L0,140 Z" fill="#0f8387" opacity="0.15"/>
        <path d="M0,78 C60,42 110,82 160,52 C210,18 250,68 300,45 C340,22 370,58 400,38 L400,140 L0,140 Z" fill="#07264b" opacity="0.17"/>
        <circle cx="30" cy="18" r="4" fill="#f59e0b" opacity="0.55"/>
        <circle cx="130" cy="8" r="3" fill="#0f8387" opacity="0.5"/>
        <circle cx="220" cy="20" r="5" fill="#07264b" opacity="0.4"/>
        <circle cx="310" cy="6" r="3.5" fill="#f59e0b" opacity="0.55"/>
        <circle cx="370" cy="22" r="3" fill="#0f8387" opacity="0.45"/>
      </svg>
    </div>
  </div>

  <div class="watermark">TotalMoney.kr</div>
</body>
</html>
