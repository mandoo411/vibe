<!DOCTYPE html>
<!-- 슬라이드 5 — CTA (고정 문구, 치환 변수 없음) -->
<html lang="ko">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="./_shared-light.css" />
<style>
  .cta-wrap {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 90px;
  }
  .cta-lead {
    font-size: 30px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 20px;
  }
  .cta-title {
    font-size: 46px;
    font-weight: 800;
    line-height: 1.4;
    margin-bottom: 56px;
  }
  .cta-features {
    display: flex;
    flex-direction: column;
    gap: 22px;
    margin-bottom: 64px;
    width: 100%;
  }
  .cta-feature {
    font-size: 28px;
    font-weight: 700;
    padding: 22px 32px;
    text-align: left;
  }
  .cta-link {
    font-size: 40px;
    font-weight: 800;
    color: var(--accent-gold);
    margin-bottom: 16px;
  }
  .cta-sub {
    font-size: 24px;
    font-weight: 600;
    color: var(--text-secondary);
  }
</style>
</head>
<body>
  <div class="brand-lockup">
    <div class="logo-box"><span>TM</span><span>AI</span></div>
    <div>
      <div class="brand-name">TotalMoney</div>
      <div class="brand-sub">powered by <span class="ai-badge">AI</span></div>
    </div>
  </div>

  <div class="cta-wrap">
    <div class="cta-lead">더 자세한 분석이 필요하다면</div>
    <div class="cta-title">AI가 매일 먼저 읽는<br/>시장의 흐름</div>
    <div class="cta-features">
      <div class="panel cta-feature">AI 종목 심층 분석</div>
      <div class="panel cta-feature">실시간 차트 분석</div>
      <div class="panel cta-feature">실시간 알림</div>
    </div>
    <div class="cta-link">→ totalmoney.kr</div>
    <div class="cta-sub">텔레그램 구독하기 · t.me/totalmoney_ai</div>
  </div>

  <div class="watermark">TotalMoney.kr</div>
</body>
</html>
