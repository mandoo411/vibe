<!DOCTYPE html>
<!--
  슬라이드 2 — 지수 현황
  치환 변수: 4개 행(row) 배열 → name,value,dir,pct
  render.mjs가 ROW_TEMPLATE 블록을 데이터 개수만큼 반복 삽입합니다.
-->
<html lang="ko">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="./_shared-light.css" />
<style>
  .title-row {
    position: absolute;
    top: 216px;
    left: 64px;
    right: 64px;
  }
  .page-title {
    font-size: 46px;
    font-weight: 800;
  }
  .rows {
    position: absolute;
    top: 320px;
    left: 64px;
    right: 64px;
    bottom: 110px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    justify-content: center;
  }
  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 30px 38px;
  }
  .row .name {
    font-size: 34px;
    font-weight: 700;
    color: var(--text-primary);
  }
  .row .value {
    font-size: 38px;
    font-weight: 800;
    margin-left: auto;
    margin-right: 22px;
  }
  .row .pct {
    font-size: 32px;
    font-weight: 800;
    min-width: 150px;
    text-align: right;
  }
</style>
</head>
<body>
  <div class="brand-lockup">
    <div class="logo-box"><span>TM</span><span>AI</span></div>
    <div>
      <div class="brand-name">TotalMoney</div>
      <div class="brand-sub">powered by <span class="ai-badge">AI</span></div>
    </div>
  </div>

  <div class="deco-ring tr"></div>

  <div class="title-row">
    <div class="icon-chip">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="12" width="4" height="9" rx="1" fill="white"/>
        <rect x="10" y="7" width="4" height="14" rx="1" fill="white"/>
        <rect x="17" y="3" width="4" height="18" rx="1" fill="#f59e0b"/>
      </svg>
    </div>
    <div class="page-title">{{PAGE_TITLE}}</div>
  </div>

  <div class="rows" id="rows">
    <!--ROW_TEMPLATE_START
    <div class="panel row">
      <div class="name">{{NAME}}</div>
      <div class="value">{{VALUE}}</div>
      <div class="pct {{DIR}}">{{ARROW}} {{PCT}}%</div>
    </div>
    ROW_TEMPLATE_END-->
  </div>

  <div class="watermark">TotalMoney.kr</div>
</body>
</html>
