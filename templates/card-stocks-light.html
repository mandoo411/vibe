<!DOCTYPE html>
<!--
  슬라이드 3 — 오늘의 TOP3 특징주
  치환 변수: 3개 행 → {{RANK}}{{NAME}}{{PCT}}{{REASON}}
-->
<html lang="ko">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="./_shared-light.css" />
<style>
  .title-row {
    position: absolute;
    top: 216px;
    left: 64px;
    right: 64px;
  }
  .page-title {
    font-size: 46px;
    font-weight: 800;
  }
  .list {
    position: absolute;
    top: 318px;
    left: 64px;
    right: 64px;
    bottom: 108px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    justify-content: center;
  }
  .item {
    display: flex;
    align-items: center;
    gap: 26px;
    padding: 28px 34px;
  }
    .rank {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    background: var(--gradient-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    font-weight: 800;
    color: #ffffff;
    flex-shrink: 0;
  }
  .rank.gold { background: linear-gradient(135deg, #ffd84d 0%, #ffb830 100%); color: #07264b; }
  .info { flex: 1; min-width: 0; }
  .info .name { font-size: 39px; font-weight: 800; margin-bottom: 6px; }
  .info .reason { font-size: 28px; color: var(--text-secondary); font-weight: 500; display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; overflow: hidden; line-height: 1.3; }
  .item .pct { font-size: 39px; font-weight: 800; flex-shrink: 0; }
</style>
</head>
<body>
  <div class="brand-lockup">
    <div class="logo-box"><span>TM</span><span>AI</span></div>
    <div>
      <div class="brand-name">TotalMoney</div>
      <div class="brand-sub">powered by <span class="ai-badge">AI</span></div>
    </div>
  </div>

  <div class="title-row">
    <div class="icon-chip">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2c1 3-2 4-2 7a3 3 0 0 0 6 0c0-1-.4-2-1-2.6.6 2 -.3 3.6-2 3.6a2 2 0 0 1-2-2c0-2 3-3 1-6z" fill="#f59e0b"/>
        <path d="M8.5 13c-.5 1.2-.8 2-.8 3.2A4.3 4.3 0 0 0 12 20.5a4.3 4.3 0 0 0 4.3-4.3c0-1.2-.4-2.2-1-3.2.3 2.4-1.2 4-3.3 4s-3.8-1.7-3.5-4z" fill="white"/>
      </svg>
    </div>
    <div class="page-title">{{PAGE_TITLE}}</div>
  </div>

  <div class="list" id="list">
    <!--ITEM_TEMPLATE_START
    <div class="panel item">
      <div class="rank {{RANK_CLASS}}">{{RANK}}</div>
      <div class="info">
        <div class="name">{{NAME}}</div>
        <div class="reason">{{REASON}}</div>
      </div>
      <div class="pct {{DIR}}">{{ARROW}} {{PCT}}%</div>
    </div>
    ITEM_TEMPLATE_END-->
  </div>

  <div class="watermark">TotalMoney.kr</div>
</body>
</html>
