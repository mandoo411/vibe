<!DOCTYPE html>
<!--
  슬라이드 3 — 오늘의 TOP3 특징주
  치환 변수: 3개 행 → {{RANK}}{{NAME}}{{PCT}}{{REASON}}
-->
<html lang="ko">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="./_shared-light.css" />
<style>
  .page-title {
    position: absolute;
    top: 240px;
    left: 64px;
    font-size: 40px;
    font-weight: 800;
  }
  .list {
    position: absolute;
    top: 340px;
    left: 64px;
    right: 64px;
    bottom: 140px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    justify-content: center;
  }
  .item {
    display: flex;
    align-items: center;
    gap: 28px;
    padding: 30px 36px;
  }
  .rank {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    background: var(--gradient-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 800;
    flex-shrink: 0;
  }
  .rank.gold { background: linear-gradient(135deg, #ffd84d 0%, #ffb830 100%); color: #07264b; }
  .info { flex: 1; min-width: 0; }
  .info .name { font-size: 32px; font-weight: 800; margin-bottom: 6px; }
  .info .reason { font-size: 22px; color: var(--text-secondary); font-weight: 500; }
  .item .pct { font-size: 36px; font-weight: 800; flex-shrink: 0; }
</style>
</head>
<body>
  <div class="brand-lockup">
    <div class="logo-box"><span>TM</span><span>AI</span></div>
    <div>
      <div class="brand-name">TotalMoney</div>
      <div class="brand-sub">powered by <span class="ai-badge">AI</span></div>
    </div>
  </div>

  <div class="page-title">오늘의 특징주 TOP3</div>

  <div class="list" id="list">
    <!--ITEM_TEMPLATE_START
    <div class="panel item">
      <div class="rank {{RANK_CLASS}}">{{RANK}}</div>
      <div class="info">
        <div class="name">{{NAME}}</div>
        <div class="reason">{{REASON}}</div>
      </div>
      <div class="pct {{DIR}}">{{ARROW}} {{PCT}}%</div>
    </div>
    ITEM_TEMPLATE_END-->
  </div>

  <div class="watermark">TotalMoney.kr</div>
</body>
</html>
