<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#07264b" />
    <title>TotalMoney AI · 미국주식</title>
    <link rel="apple-touch-icon" href="/assets/icon-t-180.png?v=6" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icon-t-32.png?v=6" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg?v=6" />
    <link rel="shortcut icon" href="/favicon.ico?v=6" />
    <link rel="manifest" href="/site.webmanifest?v=6" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="./theme.js"></script>
    <script src="./site-shell.js" defer></script>
    <link rel="stylesheet" href="./theme.css" />
    <link rel="stylesheet" href="./site-shell.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
    <link rel="stylesheet" href="./weekly-market.css" />
    <link rel="stylesheet" href="./daily-market.css" />
    <link rel="stylesheet" href="./realtime-board.css" />
    <style>
      .us-tv-widget {
        display: block;
        width: 100%;
        height: 420px;
        border: 0;
        background: #ffffff;
      }
      [data-theme="dark"] .us-tv-widget {
        background: #131722;
      }
      [data-theme="dark"] .rt-chart-wrap,
      [data-theme="dark"] .rt-chart-body {
        background: #131722;
      }
      .rt-acc-grid--4 .rt-acc-cell--spacer {
        background: transparent;
        border-right: none;
        pointer-events: none;
      }
      [data-theme="dark"] .rt-acc-grid--4 .rt-acc-cell--spacer {
        background: transparent;
      }
      #us-rank-table .rt-detail-row > td {
        padding: 0;
        border-bottom: 1px solid var(--border);
      }
      #us-rank-table tr.us-stock-row {
        cursor: pointer;
      }
      @media (min-width: 769px) {
        .page--realtime .rt-panel:has(#us-rank-table) .rt-scroll {
          overflow-x: auto;
          scrollbar-gutter: stable;
        }
        #us-rank-table {
          --us-rank-w: 50px;
          --us-name-w: 140px;
          --us-ticker-w: 58px;
          min-width: 900px;
        }
        #us-rank-table .rt-td-mcap,
        #us-rank-table th.rt-td-mcap,
        #us-rank-table .rt-td-tv,
        #us-rank-table th.rt-td-tv {
          display: table-cell !important;
        }
        #us-rank-table col.rt-col-rank {
          width: var(--us-rank-w);
        }
        #us-rank-table col.rt-col-name {
          width: var(--us-name-w);
        }
        #us-rank-table col.rt-col-ticker {
          width: var(--us-ticker-w);
        }
        #us-rank-table .rt-td-rank,
        #us-rank-table th.rt-td-rank {
          position: sticky;
          left: 0;
          z-index: 3;
          background: var(--bg-tertiary);
        }
        #us-rank-table .rt-td-name,
        #us-rank-table th.rt-td-name {
          position: sticky;
          left: var(--us-rank-w);
          z-index: 3;
          background: var(--bg-tertiary);
        }
        #us-rank-table .rt-td-ticker,
        #us-rank-table th.rt-td-ticker {
          position: sticky;
          left: calc(var(--us-rank-w) + var(--us-name-w));
          z-index: 3;
          background: var(--bg-tertiary);
          box-shadow: 4px 0 8px -4px rgba(0, 0, 0, 0.08);
        }
        #us-rank-table tbody .rt-td-rank,
        #us-rank-table tbody .rt-td-name,
        #us-rank-table tbody .rt-td-ticker {
          background: var(--bg-secondary, #fff);
        }
        [data-theme="dark"] #us-rank-table tbody .rt-td-rank,
        [data-theme="dark"] #us-rank-table tbody .rt-td-name,
        [data-theme="dark"] #us-rank-table tbody .rt-td-ticker {
          background: var(--bg-secondary, #1a1f35);
        }
        #us-rank-table th.rt-td-ticker,
        #us-rank-table td.rt-td-ticker {
          text-align: right;
          color: var(--text-dim);
          font-size: 13px;
          font-weight: 600;
        }
      }
      @media (max-width: 768px) {
        #us-rank-table {
          min-width: 0;
        }
      }
      /* iOS 모바일에서 input focus 시 줌인 방지 — font-size 16px 이상 필요 */
      #us-stock-search-input {
        font-size: 16px;
      }
    </style>
  </head>
  <body class="page-tm-v2" data-tm-tab="us">
    <div class="tm-wrap">
      <header class="home-nav" aria-label="주요 메뉴">
        <a class="home-nav__logo" href="./index.html" aria-label="TotalMoney AI 홈">
          <div class="home-nav__logo-box" aria-hidden="true">
            <span>TM</span>
            <span>AI</span>
          </div>
          <div>
            <div class="home-nav__brand-name">TotalMoney</div>
            <div class="home-nav__brand-sub">
              <span>powered by</span>
              <span class="home-nav__ai-badge">AI</span>
            </div>
          </div>
        </a>
        <button type="button" class="home-nav__toggle" aria-label="메뉴 열기" aria-expanded="false">
          <i class="ti ti-menu-2" aria-hidden="true"></i>
        </button>
        <nav class="home-nav__menu">
          <a class="home-nav__link home-nav__home-btn" href="./index.html" title="홈"><i class="ti ti-home" aria-hidden="true"></i></a>
          <a class="home-nav__link" href="./briefing.html">브리핑</a>
          <a class="home-nav__link" href="./daily-market.html">마감시황</a>
          <a class="home-nav__link" href="./market.html">시장지표</a>
          <a class="home-nav__link" href="./realtime.html">실시간시세</a>
          <a class="home-nav__link" href="./us-market.html" aria-current="page">미국주식</a>
          <a class="home-nav__link" href="./crypto.html">암호화폐</a>
          <a class="home-nav__link" href="./world-market.html">글로벌 랭킹</a>
          <a class="home-nav__link" href="./weekly-market.html">일정</a>
          <a class="home-nav__link" href="./stock-analysis.html">AI 종목분석</a>
          <button type="button" class="home-nav__theme tm-theme-toggle" id="theme-toggle" aria-label="테마 전환" title="테마 전환">
            <i class="ti ti-moon" id="theme-icon" aria-hidden="true"></i>
          </button>
        </nav>
      </header>

      <div class="home-ticker" id="home-ticker" aria-label="실시간 시장 지표" aria-live="polite">
        <span class="home-empty">시장 지표 로딩 중…</span>
      </div>

      <main class="tm-main">
        <div class="page page--realtime">
          <header class="masthead masthead--title-only">
            <div class="masthead__copy">
              <p class="masthead__kicker">US MARKETS</p>
              <h1 class="masthead__title">미국주식</h1>
            </div>
          </header>

          <div class="rt-wrap">
            <div class="rt-panel" role="tabpanel">
              <div class="rt-tabs" role="tablist" aria-label="미국주식 보기">
                <div class="rt-tabs-row-tabs">
                  <button type="button" class="rt-tab" role="tab" data-us-tab="market-cap" aria-selected="true" id="us-tab-cap" aria-label="시가총액 TOP 50">
                    <span class="rt-tab-label--full">시가총액 TOP 50</span><span class="rt-tab-label--short">시가총액</span>
                  </button>
                  <button type="button" class="rt-tab" role="tab" data-us-tab="gainers" aria-selected="false" id="us-tab-gainers" aria-label="상승률 TOP 50">
                    <span class="rt-tab-label--full"><span data-us-tab-measure-end>상승</span>률 TOP 50</span><span class="rt-tab-label--short">상승률</span>
                  </button>
                  <button type="button" class="rt-tab" role="tab" data-us-tab="volume" aria-selected="false" id="us-tab-tv" aria-label="거래대금 TOP 50">
                    <span class="rt-tab-label--full">거래대금 TOP 50</span><span class="rt-tab-label--short">거래대금</span>
                  </button>
                </div>
                <div class="rt-tab-search">
                  <div class="rt-tab-search-wrap">
                    <input type="text" id="us-stock-search-input" placeholder="종목명 또는 티커 검색" autocomplete="off" />
                    <div id="us-ac" class="rt-ac" hidden></div>
                    <button type="button" id="us-stock-search-btn">조회</button>
                  </div>
                </div>
              </div>

              <div class="rt-data-freshness" id="us-data-freshness" aria-live="polite"></div>

              <div id="us-stock-result-panel" class="rt-stock-panel" hidden aria-live="polite"></div>

              <div class="table-box">
                <div class="rt-scroll">
                  <div class="rt-header-row" aria-hidden="true">
                    <span class="rt-col-rank"></span>
                    <span class="rt-col-name">종목명</span>
                    <span class="rt-col-price">가격</span>
                    <span class="rt-col-change">등락률</span>
                    <span class="rt-col-last">시가총액</span>
                  </div>
                  <table class="rt-table" id="us-rank-table" data-rt-tab="cap" aria-label="미국주식 TOP 50">
                    <colgroup>
                      <col class="rt-col-rank" />
                      <col class="rt-col-name" />
                      <col class="rt-col-ticker" />
                      <col class="rt-col-price" />
                      <col class="rt-col-vs" />
                      <col class="rt-col-chg" />
                      <col class="rt-col-tv" />
                      <col class="rt-col-mcap" />
                    </colgroup>
                    <thead>
                      <tr id="us-rank-head">
                        <th class="rt-td-rank">순위</th>
                        <th class="rt-td-name">종목명</th>
                        <th class="num rt-td-ticker">티커</th>
                        <th class="num rt-td-price">가격</th>
                        <th class="num rt-td-vs">대비</th>
                        <th class="num rt-td-chg">등락률</th>
                        <th class="num rt-td-tv">거래대금</th>
                        <th class="num rt-td-mcap" id="us-metric-h">시가총액</th>
                      </tr>
                    </thead>
                    <tbody id="us-rank-tbody"></tbody>
                  </table>
                </div>
              </div>
            </div>

            <p id="us-error" class="rt-error" hidden></p>
          </div>
        </div>
      </main>

      <footer class="home-footer">
        <div class="home-footer__top">
          <div>
            <div class="home-footer__brand-name">TotalMoney AI</div>
            <div class="home-footer__slogan">실시간 시장을 AI로 분석하세요</div>
          </div>
          <div class="home-footer__divider" aria-hidden="true"></div>
          <a class="home-footer__tg" href="https://t.me/mandoo_market_bot" target="_blank" rel="noopener noreferrer">텔레그램봇 @mandoo_market_bot</a>
          <div class="home-footer__sns">
            <a href="https://www.instagram.com/totalmoney_ai/" target="_blank" rel="noopener noreferrer" aria-label="Instagram"><i class="ti ti-brand-instagram"></i></a>
            <a href="https://t.me/totalmoney_ai" target="_blank" rel="noopener noreferrer" aria-label="Telegram"><i class="ti ti-brand-telegram"></i></a>
            <a href="#" aria-label="X"><i class="ti ti-brand-x"></i></a>
          </div>
        </div>
        <div class="home-footer__bottom">
          <span>© 2026 TotalMoney AI</span>
          <div class="home-footer__links">
            <a href="#">이용약관</a>
            <a href="#">개인정보처리방침</a>
            <a href="mailto:contact@totalmoney.ai">문의하기</a>
          </div>
          <span>Data by KIS · FMP · CMC</span>
        </div>
      </footer>

      <nav class="tm-bottom-nav" aria-label="모바일 빠른 이동"></nav>
    </div>

    <script src="./us-market.js"></script>
  </body>
</html>
