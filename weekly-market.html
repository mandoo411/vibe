      <main class="schedule-page">

          "Producer Price Index MoM": "생산자물가지수 (월간)",
          "Producer Price Index YoY": "생산자물가지수 (연간)",
          "Employment Change": "고용변화",

          "German GDP q/q": "독일 GDP (분기)",
          "German Ifo Business Climate": "독일 IFO 기업환경지수",
          "Eurozone CPI y/y": "유로존 소비자물가 (연간)",
          "Eurozone GDP q/q": "유로존 GDP (분기)",
          "Eurozone PMI": "유로존 PMI",
          "BOE Interest Rate Decision": "영란은행 금리 결정",

          "BOJ Interest Rate Decision": "일본은행 금리 결정",
          "Japan CPI y/y": "일본 소비자물가 (연간)",
          "Tankan Manufacturing Index": "단칸 제조업지수",
          "China CPI y/y": "중국 소비자물가 (연간)",
          "China GDP q/q": "중국 GDP (분기)",
          "China Manufacturing PMI": "중국 제조업 PMI",
          "Caixin Manufacturing PMI": "차이신 제조업 PMI",
          "Commemoration of Atatürk, Youth and Sports Day": "아타튀르크 청소년 체육의 날 (터키)",
          "G7 Summit": "G7 정상회의",
          "G20 Summit": "G20 정상회의",
          "GDP Growth Annualized 1st Est": "GDP 성장률 연율 1차 추정",
          "GDP Growth Rate": "GDP 성장률",
          "GDP Growth Rate QoQ": "GDP 성장률 (분기)",
          "GDP Growth Rate YoY": "GDP 성장률 (연간)",
          "Balance of Trade": "무역수지",
          "Non-Oil Exports MoM": "비석유 수출 (월간)",
          "Non-Oil Exports YoY": "비석유 수출 (연간)",
          "Consumer Inflation Expectations": "소비자 인플레이션 기대",
          "House Price Index YoY": "주택가격지수 (연간)",
          "Composite NZ PCI": "뉴질랜드 복합 PCI",
          "Services NZ PSI": "뉴질랜드 서비스 PSI",
          "Legislative Election": "의회 선거",
          "Constitution Day": "제헌절",
          "Liberation Day": "해방기념일",
          "Ascension Day": "예수승천일",
          "Victoria Day": "빅토리아 데이",
          "Battle of Las Piedras": "라스 피에드라스 전투 기념일",
        };
        const state = { data: null, month: null, selectedDate: null };
        const $ = (id) => document.getElementById(id);

        function seoulYmd(date = new Date()) {
          return new Intl.DateTimeFormat("sv-SE", {
            timeZone: "Asia/Seoul",
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
          }).format(date);
        }

        function addDays(ymd, days) {
          const d = new Date(`${ymd}T12:00:00+09:00`);
          d.setDate(d.getDate() + days);
          return seoulYmd(d);
        }

        function kstDayOfWeek(ymd) {
          return new Date(`${ymd}T12:00:00+09:00`).getUTCDay();
        }

        function monthKey(ymd) {
          return String(ymd || seoulYmd()).slice(0, 7);
        }

        function monthKeyFromParts(year, monthIndex) {
          const d = new Date(year, monthIndex, 1);
          return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
        }

        function fmtDate(ymd) {
          if (!ymd) return "—";
          const [, m, d] = ymd.split("-");
          return `${Number(m)}월 ${Number(d)}일 (${WD[kstDayOfWeek(ymd)]})`;
        }

        function holidayName(ymd) {
          const md = String(ymd || "").slice(5);
          const fixedHolidays = {
            "01-01": "신정",
            "03-01": "삼일절",
            "05-05": "어린이날",
            "06-06": "현충일",
            "08-15": "광복절",
            "10-03": "개천절",
            "10-09": "한글날",
            "12-25": "성탄절",
          };
          return fixedHolidays[md] || "";
        }

        function marketClosedReason(ymd) {
          const day = kstDayOfWeek(ymd);
          if (day === 0) return "주말(일요일)";
          if (day === 6) return "주말(토요일)";
          const fixed = holidayName(ymd);
          if (fixed) return fixed;
          const holidayEvent = (state.data?.economicCalendar || []).find((row) => {
            if (row.date !== ymd) return false;
            const name = String(row.event || "");
            return /holiday|constitution day|liberation day|victoria day|ascension day/i.test(name);
          });
          return holidayEvent ? translateIndicator(holidayEvent.event) : "";
        }

        function renderClosedNotice(ymd) {
          const reason = marketClosedReason(ymd);
          if (!reason) return "";
          return `<div class="market-closed">
            <strong>휴장</strong>
            <span>${escapeHtml(reason)}로 국내 증시는 열리지 않습니다.</span>
          </div>`;
        }

        function escapeHtml(v) {
          return String(v == null ? "" : v)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
        }

        function money(v) {
          if (v == null || v === "") return "—";
          const n = Number(v);
          if (!Number.isFinite(n)) return escapeHtml(v);
          return n >= 1_000_000 ? `${Math.round(n / 1_000_000).toLocaleString()}M` : n.toLocaleString();
        }

        function itemsForDate(type, ymd) {
          const rows = state.data?.[type] || [];
          const sameDateRows = rows.filter((row) => row.date === ymd);
          return type === "economicCalendar" ? sameDateRows.filter(isHighImpact) : sameDateRows;
        }

        function impactClass(impact) {
          const key = String(impact || "low").toLowerCase();
          if (key.includes("high")) return "impact-high";
          if (key.includes("medium")) return "impact-medium";
          return "impact-low";
        }

        function isHighImpact(row) {
          const impact = row && row.impact;
          const importance = Number(row && row.importance);
          if (impact === 3 || impact === "3") return true;
          if (String(impact || "").toLowerCase() === "high") return true;
          return Number.isFinite(importance) && importance >= 3;
        }

        function translateIndicator(name) {
          const raw = String(name || "").trim();
          if (!raw) return raw;
          if (INDICATOR_KO[raw]) return INDICATOR_KO[raw];
          const withoutLeadingDate = raw.replace(/^\d{1,2}\s+[A-Za-z]{3,9}\s+/, "").trim();
          if (INDICATOR_KO[withoutLeadingDate]) return INDICATOR_KO[withoutLeadingDate];
          const normalized = withoutLeadingDate
            .replace(/\bMoM\b/g, "m/m")
            .replace(/\bYoY\b/g, "y/y")
            .replace(/\bQoQ\b/g, "q/q")
            .replace(/\s+/g, " ")
            .trim();
          if (INDICATOR_KO[normalized]) return INDICATOR_KO[normalized];
          const partial = Object.keys(INDICATOR_KO).find((key) => normalized.includes(key) || key.includes(normalized));
          return partial ? INDICATOR_KO[partial] : raw;
        }

        function renderEconomic(rows) {
          const highRows = (rows || []).filter(isHighImpact);
          if (!highRows.length) return '<p class="empty-text">경제지표 일정 없음</p>';
          return `<div class="schedule-table-wrap"><table class="schedule-table">
            <thead><tr><th>시간</th><th>지표명</th><th>이전값</th><th>예측값</th><th>중요도</th></tr></thead>
            <tbody>${highRows
              .map(
                (r) => `<tr class="${impactClass(r.impact)}">
                  <td>${escapeHtml(r.time || "—")}</td>
                  <td><strong>${escapeHtml(translateIndicator(r.event || "—"))}</strong><span>${escapeHtml(r.country || "")}</span></td>
                  <td>${escapeHtml(r.previous ?? "—")}</td>
                  <td>${escapeHtml(r.estimate ?? "—")}</td>
                  <td>${escapeHtml(r.impact || "low")}</td>
                </tr>`
              )
              .join("")}</tbody>
          </table></div>`;
        }

        function renderEarnings(rows) {
          if (!rows.length) return '<p class="empty-text">실적 발표 일정 없음</p>';
          return `<div class="earnings-grid">${rows
            .map(
              (r) => `<article class="earnings-card">
                <strong>${escapeHtml(r.symbol || "—")}</strong>
                <span>${escapeHtml(r.company || "—")}</span>
                <small>${escapeHtml(r.hour || "시간 미정")} · EPS ${escapeHtml(r.epsEstimate ?? "—")} · 매출 ${money(r.revenueEstimate)}</small>
              </article>`
            )
            .join("")}</div>`;
        }

        function renderSelectedDay(ymd) {
          const economic = itemsForDate("economicCalendar", ymd);
          const earnings = itemsForDate("earningsCalendar", ymd);
          $("selected-day").innerHTML = `<h3>${escapeHtml(fmtDate(ymd))}</h3>
            ${renderClosedNotice(ymd)}
            ${economic.length || earnings.length ? `${renderEconomic(economic)}${renderEarnings(earnings)}` : '<p class="empty-text">해당일 주요 일정 없음</p>'}`;
        }

        function renderCalendar() {
          const [year, month] = state.month.split("-").map(Number);
          const first = new Date(year, month - 1, 1);
          const last = new Date(year, month, 0);
          const today = seoulYmd();
          $("calendar-label").textContent = `${year}년 ${month}월`;
          const heads = WD.map((d) => `<div class="calendar-weekday">${d}</div>`).join("");
          const blanks = Array.from({ length: first.getDay() }, () => '<div class="calendar-cell calendar-cell--blank"></div>').join("");
          const days = Array.from({ length: last.getDate() }, (_, i) => {
            const day = i + 1;
            const ymd = `${state.month}-${String(day).padStart(2, "0")}`;
            const hasEconomic = itemsForDate("economicCalendar", ymd).length > 0;
            const hasEarnings = itemsForDate("earningsCalendar", ymd).length > 0;
            const active = ymd === state.selectedDate ? " calendar-cell--active" : "";
            const isToday = ymd === today ? " calendar-cell--today" : "";
            return `<button type="button" class="calendar-cell${active}${isToday}" data-date="${ymd}">
              <span>${day}</span>
              <i>${hasEconomic ? '<b class="dot dot--economic"></b>' : ""}${hasEarnings ? '<b class="dot dot--earnings"></b>' : ""}</i>
            </button>`;
          }).join("");
          $("month-calendar").innerHTML = heads + blanks + days;
          $("month-calendar").querySelectorAll("[data-date]").forEach((btn) => {
            btn.addEventListener("click", () => {
              state.selectedDate = btn.dataset.date;
              renderCalendar();
              renderSelectedDay(state.selectedDate);
            });
          });
        }

        function renderToday() {
          const ymd = seoulYmd();
          const economic = itemsForDate("economicCalendar", ymd);
          const earnings = itemsForDate("earningsCalendar", ymd);
          $("today-date").textContent = fmtDate(ymd);
          $("today-economic").innerHTML = `${renderClosedNotice(ymd)}${
            economic.length || earnings.length ? renderEconomic(economic) : '<p class="empty-text">오늘 주요 일정 없음</p>'
          }`;
          $("today-earnings").innerHTML = earnings.length ? renderEarnings(earnings) : '<p class="empty-text">오늘 주요 일정 없음</p>';
        }

        function startOfWeek(ymd) {
          const day = kstDayOfWeek(ymd);
          if (day === 0) return addDays(ymd, 1);
          if (day === 6) return addDays(ymd, 2);
          return addDays(ymd, 1 - day);
        }

        function renderWeek() {
          const monday = startOfWeek(seoulYmd());
          const days = WEEKDAYS.map((_, i) => addDays(monday, i));
          $("week-range").textContent = `${fmtDate(days[0])} ~ ${fmtDate(days[4])}`;
          $("week-tabs").innerHTML = days
            .map((ymd, i) => `<button type="button" class="week-tab" role="tab" aria-selected="${i === 0}" data-index="${i}">${WEEKDAYS[i]}<span>${ymd.slice(5).replace("-", "/")}</span></button>`)
            .join("");
          $("week-panels").innerHTML = days
            .map((ymd, i) => `<section class="week-panel${i === 0 ? " is-active" : ""}" data-index="${i}">
              <h3>${escapeHtml(fmtDate(ymd))}</h3>
              ${renderEconomic(itemsForDate("economicCalendar", ymd))}
              ${renderEarnings(itemsForDate("earningsCalendar", ymd))}
            </section>`)
            .join("");
          $("week-tabs").querySelectorAll(".week-tab").forEach((btn) => {
            btn.addEventListener("click", () => {
              const idx = btn.dataset.index;
              $("week-tabs").querySelectorAll(".week-tab").forEach((b) => b.setAttribute("aria-selected", b.dataset.index === idx));
              $("week-panels").querySelectorAll(".week-panel").forEach((p) => p.classList.toggle("is-active", p.dataset.index === idx));
            });
          });
        }

        function renderAnalysis() {
          const ai = state.data?.analysis || {};
          const top = ai.topEvents || [];
          const impacts = ai.marketImpacts || [];
          const earnings = ai.watchEarnings || [];
          $("analysis-grid").innerHTML = `
            <article><h3>이번주 핵심 이벤트 TOP5</h3>${top.length ? `<ol>${top.map((v) => `<li>${escapeHtml(v)}</li>`).join("")}</ol>` : '<p class="empty-text">분석 대기 중</p>'}</article>
            <article><h3>국내 시장 영향 분석</h3>${impacts.length ? `<ul>${impacts.map((v) => `<li>${escapeHtml(v)}</li>`).join("")}</ul>` : '<p class="empty-text">분석 대기 중</p>'}</article>
            <article><h3>주목 실적 발표 종목</h3>${earnings.length ? `<ul>${earnings.map((v) => `<li>${escapeHtml(v)}</li>`).join("")}</ul>` : '<p class="empty-text">분석 대기 중</p>'}</article>`;
        }

        function renderNews() {
          const rows = state.data?.news || [];
          $("news-list").innerHTML = rows.length
            ? rows
                .slice(0, 20)
                .map((n) => `<a class="news-card" href="${escapeHtml(n.url || "#")}" target="_blank" rel="noopener noreferrer" title="${escapeHtml(n.headline || "")}">
                  <span>${escapeHtml(n.source || "News")} · ${escapeHtml(n.timeLabel || "")}</span>
                  <strong>${escapeHtml(n.headline || "제목 없음")}</strong>
                  <i aria-hidden="true">→</i>
                </a>`)
                .join("")
            : '<p class="empty-text">뉴스 없음</p>';
        }

        async function load() {
          try {
            const res = await fetch(DATA_URL, { cache: "no-store" });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            state.data = await res.json();
            const today = seoulYmd();
            state.month = monthKey(today);
            state.selectedDate = today;
            $("weekly-updated").textContent = state.data.meta?.lastUpdatedKst ? `마지막 업데이트: ${state.data.meta.lastUpdatedKst}` : "마지막 업데이트: —";
            renderCalendar();
            renderSelectedDay(today);
            renderToday();
            renderWeek();
            renderAnalysis();
            renderNews();
          } catch (e) {
            $("masthead-notice").hidden = false;
            $("masthead-notice").textContent = `데이터를 불러오지 못했습니다: ${e instanceof Error ? e.message : e}`;
          }
        }

        $("calendar-prev").addEventListener("click", () => {
          const [y, m] = state.month.split("-").map(Number);
          state.month = monthKeyFromParts(y, m - 2);
          renderCalendar();
        });
        $("calendar-next").addEventListener("click", () => {
          const [y, m] = state.month.split("-").map(Number);
          state.month = monthKeyFromParts(y, m);
          renderCalendar();
        });

        load();
      })();
    </script>
  </body>
</html>
