<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0d0b08" />
    <title>TotalMoney AI · 주간 증시 일정</title>
    <link rel="icon" type="image/png" href="./assets/totalmoney_ai.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+KR:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./weekly-market.css" />
  </head>
  <body>
    <div class="page">
      <header class="masthead">
        <a class="masthead__brand" href="./daily-market.html" aria-label="TotalMoney AI 홈">
          <img
            class="masthead__logo"
            src="./assets/totalmoney_ai.png"
            alt=""
            width="40"
            height="40"
            decoding="async"
          />
          <span class="masthead__brand-text">
            <span class="masthead__brand-name">TotalMoney AI</span>
            <span class="masthead__brand-tagline">Smarter Financial Decisions</span>
          </span>
        </a>
        <div class="masthead__copy">
          <p class="masthead__kicker">Market Week</p>
          <h1 class="masthead__title" id="masthead-title">주간 증시 일정</h1>
          <p class="masthead__notice" id="masthead-notice" hidden></p>
          <div class="masthead__meta">
            <span id="masthead-range"></span>
            <span id="masthead-updated"></span>
            <span id="masthead-tz"></span>
          </div>
        </div>
      </header>

      <div class="tabs" id="tabs" role="tablist" aria-label="요일별 일정"></div>

      <div class="panels" id="panels"></div>
    </div>

    <script src="./weekly-market.js"></script>
  </body>
</html>
