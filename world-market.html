    <style>
      .world-panel {
        border: 1px solid var(--border-strong);
        background: var(--bg-panel);
        box-shadow: var(--sheet-shadow);
        overflow: hidden;
      }
      .world-toolbar {
        display: flex;
        margin: 0;
        padding: 0;
        gap: 0;
        border-bottom: 1px solid var(--border-strong);
        background: var(--bg-secondary);
      }
      .world-tab {
        flex: 1;
        min-width: 0;
        border: 0;
        border-right: 1px solid var(--border);
        border-radius: 0;
        background: transparent;
        color: var(--text-muted);
        min-height: 42px;
        padding: 0 14px;
        font-family: var(--font-mono);
        font-size: 12px;
        cursor: pointer;
        transition: color 0.15s, background 0.15s;
      }
      .world-tab:last-child {
        border-right: 0;
      }
      .world-tab:hover {
        color: var(--text);
        background: var(--bg-tertiary);
      }
      .world-tab[aria-pressed="true"] {
        color: var(--accent-bright);
        background: var(--bg-panel);
        box-shadow: inset 0 3px 0 var(--accent-bright);
      }
      .world-scroll {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      .world-table {
        width: 100%;
        min-width: 920px;
        border-collapse: collapse;
        table-layout: fixed;
        font-size: 13px;
      }
      .world-table col.world-col-rank {
        width: 3rem;
      }
      .world-table col.world-col-name {
        width: 32%;
      }
      .world-table col.world-col-num {
        width: 9.5rem;
      }
      .world-table col.world-col-spark {
        width: 8.5rem;
      }
      .world-table col.world-col-country {
        width: 9.25rem;
      }
      .world-table tbody tr:nth-child(even) {
        background: color-mix(in srgb, var(--bg-tertiary) 50%, transparent);
      }
      .world-table tbody tr:hover {
        background: var(--accent-dim);
      }
      .world-table th,
      .world-table td {
        padding: 9px 10px;
        border-bottom: 1px solid var(--border);
        vertical-align: middle;
      }
      .world-table thead th {
        text-align: left;
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--text-dim);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        background: var(--bg-tertiary);
        border-top: 0;
      }
      .world-table th.world-col-rank,
      .world-table td.world-col-rank {
        text-align: center;
        padding-left: 8px;
        padding-right: 8px;
      }
      .world-table th.world-col-name,
      .world-table td.world-col-name {
        text-align: left;
      }
      .world-table th.world-col-num,
      .world-table td.world-col-num,
      .world-table th.world-num,
      .world-table td.world-num {
        text-align: right;
        padding-right: 12px;
        padding-left: 8px;
      }
      .world-table th.world-col-spark,
      .world-table td.world-col-spark {
        text-align: center;
        padding-left: 4px;
        padding-right: 4px;
      }
      .world-num {
        font-family: var(--font-mono);
        white-space: nowrap;
        font-variant-numeric: tabular-nums;
      }
      .world-rank {
        font-family: var(--font-mono);
        white-space: nowrap;
        font-variant-numeric: tabular-nums;
      }
      .world-company {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }
      .world-company > div {
        min-width: 0;
        flex: 1 1 0;
        overflow: hidden;
      }
      .world-logo {
        flex: 0 0 32px;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: var(--bg-tertiary);
        object-fit: contain;
      }
      .world-logo--fallback {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-family: "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif;
        font-size: 16px;
        line-height: 1;
        background: var(--bg-tertiary);
      }
      .world-company strong {
        display: block;
        color: var(--text);
      }
      .world-company span {
        display: block;
        margin-top: 2px;
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--text-dim);
      }
      .world-delta--up {
        color: var(--up-color);
      }
      .world-delta--down {
        color: var(--down-color);
      }
      .world-spark {
        display: block;
        margin: 0 auto;
        max-width: 100%;
        height: 36px;
        width: 120px;
      }
      .world-spark path {
        fill: none;
        stroke-width: 1.5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .world-spark--up path {
        stroke: var(--up-color);
      }
      .world-spark--down path {
        stroke: var(--down-color);
      }
      .world-spark--flat path {
        stroke: var(--text-secondary);
      }
      .world-spark-empty {
        color: var(--text-dim);
        font-family: var(--font-mono);
        font-size: 11px;
      }
      .world-table th.world-col-country,
      .world-table td.world-col-country {
        text-align: left;
        padding-left: 10px;
      }
      .world-country {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 11px;
        color: var(--text-muted);
        white-space: nowrap;
      }
      .world-country__flag {
        font-family: "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif;
        font-size: 16px;
        line-height: 1;
        flex-shrink: 0;
      }
      .world-country__label {
        font-family: var(--font-mono);
      }
      .world-company-country {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        margin-top: 3px;
        font-size: 10px;
        color: var(--text-dim);
        white-space: nowrap;
      }
      .world-company-country .world-country__flag {
        font-size: 13px;
      }
      .world-company-country .world-country__label {
        font-family: var(--font-mono);
        font-size: 10px;
      }
      .world-empty {
        text-align: center;
        padding: 24px 12px;
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--text-dim);
      }
      .world-panel--ranking {
        margin-top: 0;
      }
      .world-col-hide-desktop {
        display: none;
      }
      .world-name-btn {
        font: inherit;
        font-weight: 600;
        color: var(--text);
        background: none;
        border: 0;
        padding: 0;
        cursor: pointer;
        text-align: left;
        max-width: 100%;
      }
      .world-name-btn:hover,
      .world-name-btn:focus-visible {
        color: var(--accent-bright);
        text-decoration: underline;
        outline: none;
      }
      .world-col-symbol {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--text-dim);
        white-space: nowrap;
      }
      .world-detail-row td {
        padding: 0 !important;
        background: var(--bg-secondary);
        border-bottom: 1px solid var(--border);
      }
      .world-detail {
        padding: 10px 12px 12px;
        border-top: 1px solid var(--border);
      }
      .world-detail__stats {
        display: flex;
        flex-wrap: wrap;
        gap: 10px 16px;
        margin-bottom: 10px;
        font-family: var(--font-mono);
        font-size: 12px;
      }
      .world-detail__stats dt {
        margin: 0;
        font-size: 10px;
        color: var(--text-dim);
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .world-detail__stats dd {
        margin: 2px 0 0;
        color: var(--text);
        font-weight: 600;
      }
      .world-detail__chart-label {
        margin: 0 0 6px;
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--text-dim);
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .world-detail .world-spark {
        width: 100%;
        max-width: 100%;
        height: 44px;
      }
      .world-row.is-open {
        background: var(--accent-dim);
      }
      @media (max-width: 768px) {
        .world-scroll {
          overflow-x: hidden !important;
        }
        .world-panel--ranking .world-table {
          min-width: 0 !important;
          width: 100% !important;
          max-width: 100%;
          table-layout: fixed;
        }
        .world-table th,
        .world-table td {
          padding: 8px 6px;
        }
        .world-col-hide-desktop {
          display: table-cell !important;
        }
        .world-table col.world-col-rank {
          width: 1.9rem;
        }
        .world-table col.world-col-name {
          width: 30%;
        }
        .world-table col.world-col-symbol {
          width: 14%;
        }
        .world-table col.world-col-metric {
          width: 26%;
        }
        .world-table col.world-col-country {
          width: 18%;
        }
        .world-table td.world-col-name,
        .world-table th.world-col-name {
          overflow: hidden;
          max-width: 0;
        }
        .world-table td.world-col-symbol,
        .world-table th.world-col-symbol {
          overflow: hidden;
          text-overflow: ellipsis;
        }
        .world-name-btn {
          display: block;
          width: 100%;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
          font-size: 12px;
        }
        .world-country__label {
          display: none;
        }
        .world-table th.world-col-num,
        .world-table td.world-col-num {
          padding-right: 6px;
          padding-left: 4px;
        }
        .world-company {
          gap: 8px;
        }
        .world-company strong {
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }
        .world-company span {
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }
        .world-col-hide-mobile,
        .world-panel--ranking col.world-col-hide-mobile {
          display: none !important;
          width: 0 !important;
          max-width: 0 !important;
          padding: 0 !important;
          border: 0 !important;
          visibility: collapse;
        }
        .world-panel--ranking .world-num {
          font-size: 13px;
        }
        .world-panel--ranking .world-company .world-logo,
        .world-panel--ranking .world-company span,
        .world-panel--ranking .world-company-country {
          display: none;
        }
        .world-panel--ranking .world-company {
          display: block;
        }
        .world-panel--ranking .world-company > div {
          display: none;
        }
        .world-table th.world-col-country,
        .world-table td.world-col-country {
          text-align: center;
          padding-left: 4px;
          padding-right: 4px;
        }
      }
    </style>

    <script>
      (() => {
        const state = { type: "marketCap", openKey: null, rows: [] };
        const STORAGE_KEY_PREFIX = "tm-world-market:";
        const labels = { marketCap: "시가총액", netIncome: "순이익", revenue: "매출액" };
        const valueLabels = { marketCap: "Market Cap", netIncome: "Earnings", revenue: "Revenue" };
        const metricHeadersMobile = { marketCap: "시총", netIncome: "순이익", revenue: "매출" };
        const isMobile = () => window.matchMedia("(max-width: 768px)").matches;
        const $ = (id) => document.getElementById(id);
        function cacheKey(type) {
          return `${STORAGE_KEY_PREFIX}${type}`;
        }
        function readCachedRows(type) {
          try {
            const raw = sessionStorage.getItem(cacheKey(type));
            if (!raw) return [];
            const parsed = JSON.parse(raw);
            return Array.isArray(parsed?.rows) ? parsed.rows : [];
          } catch {
            return [];
          }
        }
        function writeCachedRows(type, rows) {
          try {
            sessionStorage.setItem(cacheKey(type), JSON.stringify({ rows, savedAt: Date.now() }));
          } catch {
            // ignore storage quota / private mode
          }
        }
        function escapeHtml(value) {
          return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        }
        function fmtMoney(value) {
          const n = Number(value);
          if (!Number.isFinite(n)) return "—";
          const abs = Math.abs(n);
          if (abs >= 1e12) return `$${(n / 1e12).toFixed(2)}T`;
          if (abs >= 1e9) return `$${(n / 1e9).toFixed(2)}B`;
          if (abs >= 1e6) return `$${(n / 1e6).toFixed(1)}M`;
          return `$${n.toLocaleString("en-US", { maximumFractionDigits: 2 })}`;
        }
        function fmtPrice(value, currency) {
          const n = Number(value);
          if (!Number.isFinite(n)) return "—";
          if (currency === "KRW") {
            return `₩${n.toLocaleString("ko-KR", { maximumFractionDigits: 0 })}`;
          }
          return `$${n.toLocaleString("en-US", { maximumFractionDigits: 2 })}`;
        }
        function fmtPct(value) {
          const n = Number(value);
          if (!Number.isFinite(n)) return "—";
          return `${n > 0 ? "+" : ""}${n.toFixed(2)}%`;
        }
        function deltaClass(value) {
          const n = Number(value);
          return n > 0 ? "world-delta--up" : n < 0 ? "world-delta--down" : "";
        }
        function metricValue(row) {
          const v = row.value;
          if (v != null && v > 0) return v;
          if (state.type === "marketCap") return row.marketCap;
          if (state.type === "netIncome") return row.netIncome;
          return row.revenue;
        }
        function sparklineSvg(points, up) {
          if (!Array.isArray(points) || points.length < 2) return "";
          const w = 120;
          const h = 36;
          const min = Math.min(...points);
          const max = Math.max(...points);
          const range = max - min || 1;
          const step = w / (points.length - 1);
          let d = "";
          points.forEach((p, i) => {
            const x = (i * step).toFixed(1);
            const y = (h - 3 - ((p - min) / range) * (h - 6)).toFixed(1);
            d += `${i === 0 ? "M" : "L"}${x},${y} `;
          });
          const trend =
            up === true ? "world-spark--up" : up === false ? "world-spark--down" : "world-spark--flat";
          return `<svg class="world-spark ${trend}" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" aria-hidden="true"><path d="${d.trim()}"/></svg>`;
        }
        function worldLogoFail(img) {
          if (img.dataset.fallback && !img.dataset.triedFb) {
            img.dataset.triedFb = "1";
            img.src = img.dataset.fallback;
            return;
          }
          const span = document.createElement("span");
          span.className = "world-logo world-logo--fallback";
          span.setAttribute("aria-hidden", "true");
          span.textContent = img.dataset.flag || "\u{1F310}";
          img.replaceWith(span);
        }
        function logoCell(row) {
          const flag = row.flag || "\u{1F310}";
          if (!row.logo) {
            return `<span class="world-logo world-logo--fallback" aria-hidden="true">${escapeHtml(flag)}</span>`;
          }
          const fb = row.logoFallback ? ` data-fallback="${escapeHtml(row.logoFallback)}"` : "";
          return `<img class="world-logo" src="${escapeHtml(row.logo)}" alt="" width="32" height="32" loading="lazy" data-flag="${escapeHtml(flag)}"${fb} onerror="worldLogoFail(this)">`;
        }
        function countryParts(row) {
          const flag = row.flag || "\u{1F310}";
          const label = row.countryLabel || row.country || "—";
          const full = row.country || label;
          return { flag, label, full };
        }
        function countryCell(row) {
          const { flag, label, full } = countryParts(row);
          const title = full !== label ? ` title="${escapeHtml(full)}"` : "";
          return `<span class="world-country"${title}><span class="world-country__flag" aria-hidden="true">${flag}</span><span class="world-country__label">${escapeHtml(label)}</span></span>`;
        }
        function rowKey(row) {
          return String(row.symbol || row.name || row.rank || "")
            .trim()
            .toUpperCase();
        }
        function syncTabs() {
          document.querySelectorAll(".world-tab").forEach((btn) => {
            btn.setAttribute("aria-pressed", btn.dataset.type === state.type ? "true" : "false");
          });
          const mobile = isMobile();
          const metricHeader = document.getElementById("world-metric-header");
          if (metricHeader) {
            metricHeader.textContent = mobile ? metricHeadersMobile[state.type] : valueLabels[state.type];
          }
          const thName = document.getElementById("world-th-name");
          const thSymbol = document.getElementById("world-th-symbol");
          const thCountry = document.getElementById("world-th-country");
          if (thName) thName.textContent = mobile ? "이름" : "Name";
          if (thSymbol) thSymbol.textContent = mobile ? "티커" : "Ticker";
          if (thCountry) thCountry.textContent = mobile ? "국가" : "Country";
        }
        function syncMobileTableLayout() {
          const mobile = isMobile();
          const scroll = document.querySelector(".world-scroll");
          const table = document.querySelector(".world-table");
          if (scroll) scroll.style.overflowX = mobile ? "hidden" : "";
          if (table) table.style.minWidth = mobile ? "0" : "";
          document.querySelectorAll(".world-col-hide-mobile").forEach((el) => {
            el.hidden = mobile;
          });
          document.querySelectorAll(".world-col-hide-desktop").forEach((el) => {
            el.hidden = !mobile;
          });
        }
        function detailRowHtml(row) {
          const spark =
            sparklineSvg(row.sparkline, row.sparkUp) || '<span class="world-spark-empty">—</span>';
          return `<tr class="world-detail-row">
              <td colspan="5">
                <div class="world-detail">
                  <dl class="world-detail__stats">
                    <div><dt>가격</dt><dd>${escapeHtml(fmtPrice(row.price, row.priceCurrency))}</dd></div>
                    <div><dt>등락률</dt><dd class="${deltaClass(row.changePct)}">${escapeHtml(fmtPct(row.changePct))}</dd></div>
                  </dl>
                  <p class="world-detail__chart-label">30일 차트</p>
                  ${spark}
                </div>
              </td>
            </tr>`;
        }
        function mobileRowHtml(row) {
          const key = rowKey(row);
          const open = state.openKey === key;
          const symbol = row.symbol || "—";
          const main = `<tr class="world-row${open ? " is-open" : ""}" data-key="${escapeHtml(key)}">
                <td class="world-col-rank world-rank">${escapeHtml(row.rank)}</td>
                <td class="world-col-name">
                  <button type="button" class="world-name-btn" data-key="${escapeHtml(key)}" aria-expanded="${open ? "true" : "false"}" title="${escapeHtml(row.name)}">
                    ${escapeHtml(row.name)}
                  </button>
                </td>
                <td class="world-col-symbol world-col-hide-desktop">${escapeHtml(symbol)}</td>
                <td class="world-col-num world-col-metric world-num">${escapeHtml(fmtMoney(metricValue(row)))}</td>
                <td class="world-col-country">${countryCell(row)}</td>
              </tr>`;
          return open ? `${main}${detailRowHtml(row)}` : main;
        }
        function desktopRowHtml(row) {
          const spark =
            sparklineSvg(row.sparkline, row.sparkUp) || '<span class="world-spark-empty">—</span>';
          return `<tr>
                <td class="world-col-rank world-rank">${escapeHtml(row.rank)}</td>
                <td class="world-col-name"><div class="world-company">${logoCell(row)}<div><strong title="${escapeHtml(row.name)}">${escapeHtml(row.name)}</strong><span>${escapeHtml(row.symbol || "—")}</span></div></div></td>
                <td class="world-col-symbol world-col-hide-desktop" aria-hidden="true"></td>
                <td class="world-col-num world-col-metric world-num">${escapeHtml(fmtMoney(metricValue(row)))}</td>
                <td class="world-col-num world-col-price world-num">${escapeHtml(fmtPrice(row.price, row.priceCurrency))}</td>
                <td class="world-col-num world-col-today world-num"><span class="${deltaClass(row.changePct)}">${escapeHtml(fmtPct(row.changePct))}</span></td>
                <td class="world-col-spark world-col-hide-mobile">${spark}</td>
                <td class="world-col-country">${countryCell(row)}</td>
              </tr>`;
        }
        function rowHtml(row) {
          return isMobile() ? mobileRowHtml(row) : desktopRowHtml(row);
        }
        function colSpan() {
          return isMobile() ? 5 : 8;
        }
        function renderBody() {
          const body = $("world-body");
          if (!body) return;
          if (!state.rows.length) {
            body.innerHTML = `<tr><td colspan="${colSpan()}" class="world-empty">데이터 없음</td></tr>`;
            return;
          }
          body.innerHTML = state.rows.map((row) => rowHtml(row)).join("");
        }
        function wireTable() {
          const body = $("world-body");
          if (!body || body.dataset.worldWire === "1") return;
          body.dataset.worldWire = "1";
          body.addEventListener("click", (ev) => {
            if (!isMobile()) return;
            const btn = ev.target.closest(".world-name-btn");
            if (!btn || !body.contains(btn)) return;
            const key = btn.getAttribute("data-key");
            state.openKey = state.openKey === key ? null : key;
            renderBody();
          });
        }
        async function load() {
          syncTabs();
          syncMobileTableLayout();
          const cachedRows = readCachedRows(state.type);
          if (cachedRows.length) {
            state.rows = cachedRows;
            renderBody();
          } else {
            $("world-body").innerHTML = `<tr><td colspan="${colSpan()}" class="world-empty">불러오는 중…</td></tr>`;
          }
          try {
            const res = await fetch(`/api/world-market?type=${encodeURIComponent(state.type)}`);
            const data = await res.json().catch(() => ({}));
            if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
            const keepOpen = state.openKey;
            state.rows = Array.isArray(data.rows) ? data.rows : [];
            state.openKey = keepOpen;
            writeCachedRows(state.type, state.rows);
            renderBody();
          } catch (error) {
            if (cachedRows.length) {
              state.rows = cachedRows;
              renderBody();
              return;
            }
            state.rows = [];
            $("world-body").innerHTML = `<tr><td colspan="${colSpan()}" class="world-empty">불러오지 못했습니다: ${escapeHtml(error.message || error)}</td></tr>`;
          }
        }
        document.querySelectorAll(".world-tab").forEach((btn) => {
          btn.addEventListener("click", () => {
            state.type = btn.dataset.type;
            state.openKey = null;
            load();
          });
        });
        wireTable();
        load();
        setInterval(load, 5 * 60 * 1000);
        window.matchMedia("(max-width: 768px)").addEventListener("change", () => {
          state.openKey = null;
          syncTabs();
          syncMobileTableLayout();
          renderBody();
        });
      })();
    </script>
  </body>
</html>
